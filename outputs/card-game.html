<script>
(function(){
  var vw=window.innerWidth||1,vh=window.innerHeight||1;
  var cw=document.documentElement&&document.documentElement.clientWidth||vw;
  var ch=document.documentElement&&document.documentElement.clientHeight||vh;
  var dpr=window.devicePixelRatio||1;
  var sw=screen.width||vw,sh=screen.height||vh;
  var rawW=sw/dpr,rawH=sh/dpr;
  var realW,realH;
  if(rawW<150&&dpr>2.5){realW=sw;realH=sh}
  else if(rawW<150){realW=window.outerWidth||vw;realH=window.outerHeight||vh}
  else{realW=rawW;realH=rawH}
  if(realW>realH){var t=realW;realW=realH;realH=t}
  var bestW=Math.min(Math.min(vw,cw),realW);
  var bestH=Math.min(Math.min(vh,ch),realH);
  var isZoomed=vw>realW*2&&dpr>2;
  var portrait=bestH>bestW;
  window._flW=isZoomed?vh:bestH;
  window._flH=isZoomed?vw:bestW;
  window._flZoomed=isZoomed;
  if(portrait){
    var W=window._flW, H=window._flH;
    var m, oxx, oyy;
    if(isZoomed){
      var s=1,mtx=Math.round((vw-H)/2),mty=Math.round((vh+W)/2);
      m='matrix(0,'+(-s)+','+s+',0,'+mtx+','+mty+')';
      oxx='0';oyy='0';
    }else{
      var s=W/H;oxx=H/2+'';oyy=W/2+'';
      m='matrix(0,'+(-s)+','+s+',0,'+oxx+','+oyy+')';
    }
    document.write('<style id="flCSS">'+
      'html,body{margin:0!important;padding:0!important;overflow:hidden!important;background:#05130a!important;height:100%!important}'+
      '#wrap{position:fixed!important;top:0!important;left:0!important;width:'+W+'px!important;height:'+H+'px!important;'+
      'transform-origin:'+oxx+'px '+oyy+'px!important;-webkit-transform-origin:'+oxx+'px '+oyy+'px!important;-ms-transform-origin:'+oxx+'px '+oyy+'px!important;'+
      'transform:'+m+'!important;-webkit-transform:'+m+'!important;-ms-transform:'+m+'!important}'+
    '</style>');
  }
  function reapply(){
    var el=document.getElementById('flCSS');
    var W=window._flW,H=window._flH;
    if(!W||!H)return;
    var v2=window.innerWidth||1,h2=window.innerHeight||1;
    if(h2>v2){
      var zm=window._flZoomed;
      var m, oxx, oyy;
      if(zm){
        var s=1,mtx=Math.round((v2-H)/2),mty=Math.round((h2+W)/2);
        m='matrix(0,'+(-s)+','+s+',0,'+mtx+','+mty+')';
        oxx='0';oyy='0';
      }else{
        var s=W/H;oxx=H/2+'';oyy=W/2+'';
        m='matrix(0,'+(-s)+','+s+',0,'+oxx+','+oyy+')';
      }
      var css='html,body{margin:0!important;padding:0!important;overflow:hidden!important;background:#05130a!important;height:100%!important}'+
        '#wrap{position:fixed!important;top:0!important;left:0!important;width:'+W+'px!important;height:'+H+'px!important;'+
        'transform-origin:'+oxx+'px '+oyy+'px!important;-webkit-transform-origin:'+oxx+'px '+oyy+'px!important;-ms-transform-origin:'+oxx+'px '+oyy+'px!important;'+
        'transform:'+m+'!important;-webkit-transform:'+m+'!important;-ms-transform:'+m+'!important}';
      if(el){el.textContent=css}else{var st=document.createElement('style');st.id='flCSS';st.textContent=css;(document.head||document.documentElement).appendChild(st)}
      var wrap=document.getElementById('wrap');
      if(wrap){
        wrap.style.position='fixed';wrap.style.top='0';wrap.style.left='0';
        wrap.style.width=W+'px';wrap.style.height=H+'px';
        wrap.style.transformOrigin=oxx+'px '+oyy+'px';
        wrap.style.webkitTransformOrigin=oxx+'px '+oyy+'px';
        wrap.style.msTransformOrigin=oxx+'px '+oyy+'px';
        wrap.style.transform=m;wrap.style.webkitTransform=m;wrap.style.msTransform=m;
      }
    }else{if(el)el.textContent='';var wr=document.getElementById('wrap');if(wr){wr.style.cssText=''}}
  }
  window.reapply=reapply;
  if(document.addEventListener)document.addEventListener('DOMContentLoaded',function(){reapply();setTimeout(reapply,200);setTimeout(reapply,600)});
  window.addEventListener('load',function(){reapply();setTimeout(reapply,200)});
  window.addEventListener('resize',function(){clearTimeout(window._flrt);window._flrt=setTimeout(reapply,80)});
  window.addEventListener('orientationchange',function(){setTimeout(reapply,100);setTimeout(reapply,400)});
  window.addEventListener('pageshow',function(){setTimeout(reapply,150)});
})();
</script>

.radar{position:absolute;top:50%;left:50%;width:80px;height:80px;transform:translate(-50%,-50%);pointer-events:none;z-index:80}
.radar::before{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid rgba(255,213,79,.2);animation:radarPing 1.5s ease-out infinite}
.radar::after{content:'';position:absolute;inset:25%;border-radius:50%;background:rgba(255,213,79,.15);animation:radarCore 1.5s ease-in-out infinite}
@keyframes radarPing{0%{transform:scale(.5);opacity:1}100%{transform:scale(2);opacity:0}}
@keyframes radarCore{0%,100%{transform:scale(.8);opacity:.3}50%{transform:scale(1.2);opacity:.8}}
.radar-text{position:absolute;top:50%;left:50%;transform:translate(-50%,36px);font-size:12px;color:rgba(255,213,79,.7);white-space:nowrap;font-weight:600}

@keyframes bombShake{0%,100%{transform:translate(0,0)}10%{transform:translate(-4px,-3px)}20%{transform:translate(4px,3px)}30%{transform:translate(-3px,4px)}40%{transform:translate(3px,-4px)}50%{transform:translate(-4px,2px)}60%{transform:translate(4px,-2px)}70%{transform:translate(-2px,4px)}80%{transform:translate(2px,-3px)}90%{transform:translate(-3px,3px)}}
@keyframes bombFlash{0%{box-shadow:inset 0 0 0 rgba(255,69,0,0)}25%{box-shadow:inset 0 0 80px rgba(255,69,0,.35)}100%{box-shadow:inset 0 0 0 rgba(255,69,0,0)}}
@keyframes typeFlash{0%{box-shadow:inset 0 0 0 rgba(255,215,0,0)}30%{box-shadow:inset 0 0 50px rgba(255,215,0,.2)}100%{box-shadow:inset 0 0 0 rgba(255,215,0,0)}}
@keyframes chaFlash{0%{box-shadow:inset 0 0 0 rgba(240,98,146,0)}25%{box-shadow:inset 0 0 70px rgba(240,98,146,.35)}100%{box-shadow:inset 0 0 0 rgba(240,98,146,0)}}
@keyframes dianFlash{0%{box-shadow:inset 0 0 0 rgba(156,39,176,0)}25%{box-shadow:inset 0 0 70px rgba(156,39,176,.35)}100%{box-shadow:inset 0 0 0 rgba(156,39,176,0)}}
.bomb-shake{animation:bombShake .55s ease-in-out}
.bomb-flash{animation:bombFlash .65s ease-out}
.type-flash{animation:typeFlash .5s ease-out}
.cha-flash{animation:chaFlash .55s ease-out}
.dian-flash{animation:dianFlash .55s ease-out}

<body>

<script>
// 强制横屏在 <head> 中已处理，此处只保留全局尺寸变量供 toast/showOv 使用
let _wrapW=0,_wrapH=0;
function _syncWrapDim(){let w=document.getElementById('wrap');if(w){_wrapW=w.offsetWidth;_wrapH=w.offsetHeight}else{let vw=window.innerWidth,vh=window.innerHeight;if(vh>vw){_wrapW=vh;_wrapH=vw}else{_wrapW=vw;_wrapH=vh}}}
_syncWrapDim();
window.addEventListener('resize',_syncWrapDim);
window.addEventListener('orientationchange',function(){setTimeout(_syncWrapDim,100)});

const S=['hearts','diamonds','clubs','spades'],SYM={hearts:'♥',diamonds:'♦',clubs:'♣',spades:'♠'},
RN={3:'3',4:'4',5:'5',6:'6',7:'7',8:'8',9:'9',10:'10',11:'J',12:'Q',13:'K',14:'A',15:'2',16:'小王',17:'大王'},
LN={3:'3',4:'4',5:'5',6:'6',7:'7',8:'8',9:'9',10:'10',11:'J',12:'Q',13:'K',14:'A'},
PN=['你','左对手','队友','右对手'],
TCN={single:'单张',pair:'对子',straight:'单龙',t32:'三带二',b3:'炸弹',b4:'大炸弹',dj:'双王',a44:'A44'};
function red(s){return s==='hearts'||s==='diamonds'}
function shuf(a){for(let i=a.length-1;i>0;i--){let j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}
function $(id){return document.getElementById(id)}
function sl(ms){return new Promise(r=>setTimeout(r,ms))}
let G={ph:'idle',turn:0,lv:[3,3,3,3],stg:[true,false,true,false],
  hd:[[],[],[],[]],hui:3,lp:null,lpp:-1,ps:0,
  dn:[false,false,false,false],ord:[],
  played:[[],[],[],[]],
  sel:[],hnt:0,busy:false,rnd:0,noTr:false,win:-1};
function ef(c,h){if(c.r===16)return 16;if(c.r===17)return 17;if(c.r===h&&c.r>=3&&c.r<=14)return 15.5;return c.r}
function isH(c,h){return c.r===h&&c.r>=3&&c.r<=14}
function srt(hd,h){return hd.slice().sort((a,b)=>{let x=ef(a,h),y=ef(b,h);return x!==y?x-y:S.indexOf(a.suit)-S.indexOf(b.suit)})}
function deal(){let dk=shuf((()=>{let d=[];for(let s of S)for(let r=3;r<=15;r++)d.push({suit:s,r,id:s+'_'+r});d.push({suit:'joker',r:16,id:'jb'},{suit:'joker',r:17,id:'jr'});return d})()),h=[[],[],[],[]];for(let i=0;i<52;i++)h[i%4].push(dk[i]);let lf=[dk[52],dk[53]],h3=-1;for(let p=0;p<4;p++)if(h[p].some(c=>c.suit==='hearts'&&c.r===3)){h3=p;break}if(h3<0)h3=0;h[h3].push(...lf);for(let p=0;p<4;p++)h[p]=srt(h[p],G.hui);G.hd=h;G.dn=[false,false,false,false];G.ord=[];G.lp=null;G.lpp=-1;G.ps=0;G.sel=[];G.played=[[],[],[],[]];return h3}
function detect(cards,h){
  if(!cards||!cards.length)return null;let n=cards.length;
  if(n===3){let hasA=cards.some(c=>c.r===14),fs=cards.filter(c=>c.r===4);if(hasA&&fs.length===2){let ar=cards.every(c=>red(c.suit));return{type:'a44',rk:ar?300:299,cards}}}
  if(n===1)return{type:'single',rk:ef(cards[0],h),cards};
  if(n===2){if(cards[0].r===cards[1].r)return{type:'pair',rk:ef(cards[0],h),cards};if(cards.some(c=>c.r===16)&&cards.some(c=>c.r===17))return{type:'dj',rk:250,cards};return null}
  if(n===3&&cards.every(c=>c.r===cards[0].r))return{type:'b3',rk:ef(cards[0],h),cards};
  if(n===4&&cards.every(c=>c.r===cards[0].r))return{type:'b4',rk:ef(cards[0],h),cards};
  if(n===5){let cnt={};cards.forEach(c=>cnt[c.r]=(cnt[c.r]||0)+1);let tr=Object.entries(cnt).find(e=>e[1]===3),pr=Object.entries(cnt).find(e=>e[1]===2);if(tr&&pr){let tc=cards.find(c=>c.r===+tr[0]);return{type:'t32',rk:ef(tc,h),cards}}}
  if(n>=3){let noHui=cards.every(c=>!isH(c,h));if(noHui){let ranks=cards.map(c=>c.r).sort((a,b)=>a-b);let noDup=true;for(let i=0;i<ranks.length-1;i++)if(ranks[i]===ranks[i+1]){noDup=false;break}if(noDup&&ranks[ranks.length-1]-ranks[0]===n-1)return{type:'straight',rk:ranks[ranks.length-1],cards}}}
  return null;
}
const BM=['b3','b4','dj','a44'],BO={b3:1,b4:2,dj:3,a44:4};
function beats(np,lp){if(!lp)return true;let ni=BM.includes(np.type)?BO[np.type]:0,li=BM.includes(lp.type)?BO[lp.type]:0;if(ni&&li){if(ni!==li)return ni>li;return np.rk>lp.rk}if(ni)return true;if(li)return false;if(np.type!==lp.type)return false;if(np.cards.length!==lp.cards.length)return false;return np.rk>lp.rk}
function allPlays(hand,lp,h){let ps=[],s=srt(hand,h),rc={};s.forEach(c=>{if(!rc[c.r])rc[c.r]=[];rc[c.r].push(c)});if(!lp){let seen=new Set();for(let c of s){if(!seen.has(c.r)){ps.push({type:'single',rk:ef(c,h),cards:[c]});seen.add(c.r)}}for(let[r,cs]of Object.entries(rc)){if(cs.length>=2)ps.push({type:'pair',rk:ef(cs[0],h),cards:cs.slice(0,2)});if(cs.length>=3)ps.push({type:'b3',rk:ef(cs[0],h),cards:cs.slice(0,3)});if(cs.length>=4)ps.push({type:'b4',rk:ef(cs[0],h),cards:cs.slice(0,4)});}for(let[r,cs]of Object.entries(rc))if(cs.length>=3){let pe=Object.entries(rc).find(([r2,c2])=>+r2!==+r&&c2.length>=2);if(pe)ps.push({type:'t32',rk:ef(cs[0],h),cards:[...cs.slice(0,3),...pe[1].slice(0,2)]})}{let uR=Object.keys(rc).map(Number).filter(r=>r!==h&&r>=3&&r<=15).sort((a,b)=>a-b);for(let si=0;si<uR.length;si++){let straight=[],end=si;while(end<uR.length&&uR[end]===uR[si]+(end-si)&&uR[end]<=14){straight.push(rc[uR[end]][0]);end++;if(straight.length>=3)ps.push({type:'straight',rk:uR[end-1],cards:straight.slice()})}}}let ac=s.filter(c=>c.r===14),fc=s.filter(c=>c.r===4);if(ac.length&&fc.length>=2){let a=[ac[0],fc[0],fc[1]];ps.push({type:'a44',rk:a.every(c=>red(c.suit))?300:299,cards:a})}let bj=s.find(c=>c.r===16),rj=s.find(c=>c.r===17);if(bj&&rj)ps.push({type:'dj',rk:250,cards:[bj,rj]});return ps;}let lt=lp.type,lr=lp.rk,lB=BM.includes(lt);if(!lB){if(lt==='single')for(let c of s)if(ef(c,h)>lr)ps.push({type:'single',rk:ef(c,h),cards:[c]});if(lt==='pair')for(let[r,cs]of Object.entries(rc))if(cs.length>=2&&ef(cs[0],h)>lr)ps.push({type:'pair',rk:ef(cs[0],h),cards:cs.slice(0,2)});if(lt==='t32')for(let[r,cs]of Object.entries(rc))if(cs.length>=3&&ef(cs[0],h)>lr){let pe=Object.entries(rc).find(([r2,c2])=>+r2!==+r&&c2.length>=2);if(pe)ps.push({type:'t32',rk:ef(cs[0],h),cards:[...cs.slice(0,3),...pe[1].slice(0,2)]})}if(lt==='straight'){let ln=lp.cards.length;let uR=Object.keys(rc).map(Number).filter(r=>r!==h&&r>=3&&r<=14).sort((a,b)=>a-b);for(let si=0;si<=uR.length-ln;si++){let ok=true;for(let j=0;j<ln;j++){if(uR[si+j]!==uR[si]+j){ok=false;break}}if(ok&&uR[si+ln-1]>lr){let st=[];for(let j=0;j<ln;j++)st.push(rc[uR[si+j]][0]);ps.push({type:'straight',rk:uR[si+ln-1],cards:st})}}}}for(let[r,cs]of Object.entries(rc)){if(cs.length>=3&&(!lB||BO.b3>BO[lt]||(BO.b3===BO[lt]&&ef(cs[0],h)>lr)))ps.push({type:'b3',rk:ef(cs[0],h),cards:cs.slice(0,3)});if(cs.length>=4&&(!lB||BO.b4>BO[lt]||(BO.b4===BO[lt]&&ef(cs[0],h)>lr)))ps.push({type:'b4',rk:ef(cs[0],h),cards:cs.slice(0,4)});}if(!lB||BO.dj>BO[lt]){let bj=s.find(c=>c.r===16),rj=s.find(c=>c.r===17);if(bj&&rj)ps.push({type:'dj',rk:250,cards:[bj,rj]})}if(!lB||BO.a44>BO[lt]){let ac=s.filter(c=>c.r===14),fc=s.filter(c=>c.r===4);if(ac.length&&fc.length>=2){let a=[ac[0],fc[0],fc[1]];ps.push({type:'a44',rk:a.every(c=>red(c.suit))?300:299,cards:a})}}if(lt==='a44'){let ac=s.filter(c=>c.r===14),fc=s.filter(c=>c.r===4);if(ac.length&&fc.length>=2){let a=[ac[0],fc[0],fc[1]],ar=a.every(c=>red(c.suit)),rk=ar?300:299;if(rk>lr)ps.push({type:'a44',rk,cards:a})}}if(lt==='single'&&lp.cards[0].r===4){let fours=rc[4]||[];if(fours.length>=2)ps.push({type:'cha',rk:999,cards:fours.slice(0,2)})}if(lt==='pair'&&lp.cards[0].r===4){let fours=rc[4]||[];if(fours.length>=1)ps.push({type:'dian',rk:999,cards:[fours[0]]})}return ps;}
function aiPick(pi){let hand=G.hd[pi];if(!hand.length)return null;let free=!G.lp||G.lpp===pi,plays=allPlays(hand,free?null:G.lp,G.hui);if(!plays.length)return null;let nb=plays.filter(p=>!BM.includes(p.type)),bm=plays.filter(p=>BM.includes(p.type));if(free){if(nb.length){nb.sort((a,b)=>a.rk-b.rk);return nb[0]}bm.sort((a,b)=>a.rk-b.rk);return bm[0]}if(G.lpp%2===pi%2)return null;if(nb.length){nb.sort((a,b)=>a.rk-b.rk);return nb[0]}if(hand.length<=4){bm.sort((a,b)=>a.rk-b.rk);return bm[0]}return null}
function playFX(type){let ca=$('ca');if(!ca)return;if(type==='b3'||type==='b4'||type==='dj'||type==='a44'){ca.classList.add('bomb-shake');let ov=document.createElement('div');ov.style.cssText='position:absolute;inset:0;border-radius:12px;pointer-events:none;z-index:5';ov.className=type==='a44'?'cha-flash':'bomb-flash';ca.appendChild(ov);setTimeout(()=>{ca.classList.remove('bomb-shake');ov.remove()},700);return}if(type==='cha'){let ov=document.createElement('div');ov.style.cssText='position:absolute;inset:0;border-radius:12px;pointer-events:none;z-index:5';ov.className='cha-flash';ca.appendChild(ov);setTimeout(()=>ov.remove(),600);return}if(type==='dian'){let ov=document.createElement('div');ov.style.cssText='position:absolute;inset:0;border-radius:12px;pointer-events:none;z-index:5';ov.className='dian-flash';ca.appendChild(ov);setTimeout(()=>ov.remove(),600);return}let ov=document.createElement('div');ov.style.cssText='position:absolute;inset:0;border-radius:12px;pointer-events:none;z-index:5';ov.className='type-flash';ca.appendChild(ov);setTimeout(()=>ov.remove(),550)}
function showBigText(text,color){let bt=$('bigText');if(!bt)return;bt.querySelector('.bt-inner').textContent=text;bt.querySelector('.bt-inner').style.color=color||'#fff';bt.classList.remove('show');void bt.offsetWidth;bt.classList.add('show');setTimeout(()=>bt.classList.remove('show'),1400)}
function mkC(c,cls,sel){let d=document.createElement('div'),col=red(c.suit)?'r':'b',ex='';if(isH(c,G.hui))ex=' hui';if(c.r===17)ex=' jr';if(c.r===16)ex=' jb';d.className=`c ${col}${ex} ${cls||''} ${sel?'sel':''}`;if(c.r>=16){let label=c.r===17?'大':'小';d.innerHTML=`<div class="corner"><span class="cv">${label}</span><span class="cs">王</span></div><span class="center-suit">🃏</span>`}else{let val=RN[c.r];let sym=SYM[c.suit]||'';d.innerHTML=`<div class="corner"><span class="cv">${val}</span><span class="cs">${sym}</span></div><span class="center-suit">${sym}</span>`}return d}
function cardHTML(c,cls){let col=red(c.suit)?'r':'b',ex='';if(c.r===G.hui&&c.r>=3&&c.r<=14)ex=' hui';if(c.r===17)ex=' jr';if(c.r===16)ex=' jb';let extra=cls||'';if(c.r>=16){let label=c.r===17?'大':'小';return `<div class="c ${col}${ex} ${extra}" style="cursor:default"><div class="corner"><span class="cv">${label}</span><span class="cs">王</span></div><span class="center-suit">🃏</span></div>`}let val=RN[c.r],sym=SYM[c.suit]||'';return `<div class="c ${col}${ex} ${extra}" style="cursor:default"><div class="corner"><span class="cv">${val}</span><span class="cs">${sym}</span></div><span class="center-suit">${sym}</span></div>`}

function render(){
  let st=G.stg[0]?0:1;
  $('stTxt').textContent=st===0?'我方':'对方';$('stTxt').style.color=st===0?'#64b5f6':'#ef9a9a';
  $('lU').textContent=`我方:${LN[G.lv[0]]||'过关'}${G.stg[0]?' ★':''}`;
  $('lT').textContent=`对方:${LN[G.lv[1]]||'过关'}${G.stg[1]?' ★':''}`;
  $('hTxt').textContent=RN[G.hui]||G.hui;
  let isPlay=G.ph==='play';
  // 更新四个玩家面板

function actHint(){if(G.ph!=='play'||G.turn!==0||G.busy)return;let free=!G.lp||G.lpp===0,plays=allPlays(G.hd[0],free?null:G.lp,G.hui);if(!plays.length){toast('没有能出的牌');return}G.hnt=(G.hnt+1)%(plays.length+1);if(G.hnt>=plays.length){G.sel=[];G.hnt=0}else G.sel=plays[G.hnt].cards.map(c=>c.id);render()}
async function newGame(){if(ONLINE.ws){ONLINE.ws.close();ONLINE.ws=null}clearTimeout(ONLINE.reconnectTimer);ONLINE.active=false;ONLINE.mySeat=-1;ONLINE.nickNames=null;ONLINE.code=null;ONLINE.playerId=null;ONLINE.roomPlayers=null;$('connStatus').className='offline';$('connStatus').textContent='单机模式';G.lv=[3,3,3,3];G.stg=[true,false,true,false];G.rnd=0;G.noTr=false;G.win=-1;await newRound()}
async function newRound(){G.rnd++;G.ph='deal';G.busy=true;G.lp=null;G.lpp=-1;G.ps=0;G.sel=[];G.played=[[],[],[],[]];showOv('<div class="m" style="text-align:center"><h2>第'+G.rnd+'局</h2><p style="color:#aaa">发牌中...</p><div class="radar"></div></div>');await sl(400);let h3=deal();if(G.rnd===1){let t=h3%2;G.stg=[t===0,t===1,t===0,t===1]}G.hui=G.lv[G.stg.indexOf(true)];hideOv();G._dealing=true;render();await sl(1500);G._dealing=false;if(G.rnd>1&&!G.noTr)await tributePhase();G.noTr=false;G.ph='play';G.turn=G.rnd===1?h3:(G.win>=0?G.win:0);G.busy=false;render();await loop()}
async function endRound(){G.ph='end';G.busy=true;for(let p=0;p<4;p++)if(G.hd[p].length===0&&!G.ord.includes(p)){G.ord.push(p);G.dn[p]=true}let rem=[0,1,2,3].filter(p=>!G.ord.includes(p));rem.sort((a,b)=>G.hd[a].length-G.hd[b].length);G.ord.push(...rem);let first=G.ord[0],last=G.ord[3],oldS=[...G.stg];let res;if(G.ord.length>=2&&G.ord.length<4&&G.ord[0]%2===G.ord[1]%2){res=doDbl(G.ord[0]%2,oldS)}else if(first%2===last%2){res=doSglSame(first,oldS)}else{res=doSglDiff(first,last,first%2,oldS)}G.win=res.starter;await sl(300);showRes(res);G.busy=false}
function doDbl(wt,os){let lt=1-wt,was=os[wt],dem=false;if(os[lt]){for(let p=0;p<4;p++)if(p%2===lt){if(G.lv[p]===11){G.lv[p]=3;dem=true}else if(G.lv[p]===14){G.lv[p]=11;dem=true}}if(dem)G.noTr=true}if(was)for(let p=0;p<4;p++)if(p%2===wt){let v=G.lv[p];if(v!==3&&v!==11&&v!==14){v+=2;if(v>14)v=15;G.lv[p]=v}}for(let p=0;p<4;p++)G.stg[p]=p%2===wt;return{wt,dbl:true,go:G.lv.some(l=>l>=15),dem,up:was,upgraded:was,sameTeam:false,starter:G.ord[0],msg:`${['我方','对方'][wt]}双抓!`}}
function doSglSame(first,os){let wt=first%2;for(let p=0;p<4;p++)G.stg[p]=p%2===wt;G.noTr=true;return{wt,dbl:false,go:G.lv.some(l=>l>=15),dem:false,up:false,upgraded:false,sameTeam:true,starter:first,msg:`${['我方','对方'][wt]}获胜! (1/4同队)`}}
function doSglDiff(first,last,wt,os){let was=os[wt];let upgraded=false;if(was){for(let p=0;p<4;p++)if(p%2===wt){let v=G.lv[p];if(v!==3&&v!==11&&v!==14){v+=1;if(v>14)v=15;G.lv[p]=v;upgraded=true}}}for(let p=0;p<4;p++)G.stg[p]=p%2===wt;G.noTr=false;return{wt,dbl:false,go:G.lv.some(l=>l>=15),dem:false,up:was,upgraded,sameTeam:false,starter:last,msg:`${['我方','对方'][wt]}获胜!`}}
function showRes(r){let ls=`我方:${LN[G.lv[0]]||'过关'} | 对方:${LN[G.lv[1]]||'过关'}`;if(r.go){let w=G.lv[0]>=15?'我方':'对方';showOv(`<div class="m"><div class="big">🎉</div><h2>${w}最终胜利!</h2><p class="det">${ls}</p><p class="det">${r.msg}</p><button onclick="hideOv();newGame()">再来一局</button></div>`)}else{let d=r.dem?'<p style="color:#ff5722;font-weight:700">降级! 本局免上供</p>':'',u=r.sameTeam?'<p style="color:#81c784">保持台上, 免上供, 第一名先出</p>':(r.upgraded?(r.dbl?'<p>升2级</p>':'<p>升1级</p>'):(r.up?'<p style="color:#81c784">保持台上, 免疫等级未升级</p>':'<p>上台(未升级)</p>'));showOv(`<div class="m"><h2>本局结束</h2><p>${r.msg}</p>${u}<p class="det">${ls}</p>${d}<button onclick="hideOv();newRound()">下一局</button></div>`)}}
let ONLINE={active:false,ws:null,mySeat:-1,nick:'',nickNames:null,playerId:null,code:null,roomPlayers:null,reconnectTimer:null,tributeLog:[]};
function wsUrl(){let h=window.location.hostname;let p=window.location.protocol==='https:'?'wss:':'ws:';let pt=window.location.port;if(!pt||pt==='80'||pt==='443')return p+'//'+h+'/ws';return p+'//'+h+':'+pt+'/ws'}
function connectWS(){return new Promise((resolve,reject)=>{let url=wsUrl();let w=new WebSocket(url);w.onopen=()=>{ONLINE.ws=w;setupWSHandlers();resolve()};w.onmessage=(e)=>{try{let m=JSON.parse(e.data);handleServerMsg(m)}catch(err){console.error('WS msg:',err)}};w.onclose=()=>{if(ONLINE.active&&ONLINE.code&&ONLINE.playerId){ONLINE.reconnectTimer=setTimeout(()=>{let w2=new WebSocket(wsUrl());w2.onopen=()=>{ONLINE.ws=w2;setupWSHandlers();w2.send(JSON.stringify({type:'reconnect',data:{code:ONLINE.code,playerId:ONLINE.playerId}}))};w2.onmessage=w.onmessage;w2.onclose=w.onclose;w2.onerror=()=>{}},3000)}};w.onerror=(e)=>reject(e);setTimeout(()=>reject(new Error('连接超时')),8000)})}
function setupWSHandlers(){ONLINE.ws.onclose=()=>{if(ONLINE.active&&ONLINE.code&&ONLINE.playerId){ONLINE.reconnectTimer=setTimeout(()=>{try{let w=new WebSocket(wsUrl());w.onopen=()=>{ONLINE.ws=w;setupWSHandlers();wsSend('reconnect',{code:ONLINE.code,playerId:ONLINE.playerId})};w.onmessage=(e)=>{try{handleServerMsg(JSON.parse(e.data))}catch(er){}};w.onclose=()=>{};w.onerror=()=>{}}catch(e){}},3000)}}}
function wsSend(type,data={}){if(ONLINE.ws&&ONLINE.ws.readyState===1)ONLINE.ws.send(JSON.stringify({type,data}))}
function handleServerMsg(msg){
  let d=msg.data;
  switch(msg.type){
    case 'room_created':ONLINE.code=d.code;ONLINE.playerId=d.playerId;sessionStorage.setItem('pid',d.playerId);break;
    case 'room_update':ONLINE.roomPlayers=d.players;showWaitingRoom(d.players);break;
    case 'room_joined':ONLINE.code=d.code;ONLINE.playerId=d.playerId;ONLINE.mySeat=d.seat;sessionStorage.setItem('pid',d.playerId);if(d.players)ONLINE.roomPlayers=d.players;break;
    case 'game_start':ONLINE.mySeat=d.yourSeat;ONLINE.nickNames=d.seatNames;G.lv=[3,3,3,3];G.stg=[true,false,true,false];G.rnd=0;G.noTr=false;G.win=-1;break;
    case 'state_sync':applyState(d);break;
    case 'your_turn':G.busy=false;render();break;
    case 'action_result':{let seat=d.seat;if(d.action==='pass'){G.ps++;showAP(seat,null,true)}else if(d.action==='play'||d.action==='cha'||d.action==='dian'){let fxType=d.isCha?'cha':(d.isDian?'dian':d.playType);playFX(fxType);showAP(seat,d.cards,false);let playObj={type:d.playType,rk:0,cards:d.cards};if(d.isCha)playObj.type='pair';if(d.isDian){G.lp=null;G.lpp=seat;G.ps=0}else{G.lp=playObj;G.lpp=seat;G.ps=0}if(!G.played[seat])G.played[seat]=[];G.played[seat].push(...d.cards)}render();break}
    case 'player_done':toast((ONLINE.nickNames&&ONLINE.nickNames[d.seat]?ONLINE.nickNames[d.seat]:PN[d.seat])+'出完了!');break;
    case 'interrupt_req':handleInterruptReq(d);break;
    case 'tribute_req':handleTributeReq(d);break;
    case 'tribute_result':{ONLINE.tributeLog.push(d);let lbl=d.direction==='tribute'?'上供':'回牌';let col=d.direction==='tribute'?'#ff8a65':'#81c784';let cn=SYM[d.card.suit]||'';toast((d.fromName||PN[d.from])+' '+lbl+' '+(d.toName||PN[d.to])+': '+RN[d.card.r]+cn,2000);break}
    case 'tribute_done':{let summary='';for(let e of ONLINE.tributeLog){let col=red(e.card.suit)?'#ef9a9a':'#e0e0e0';let lbl=e.direction==='tribute'?'上供':'回牌';let lblCol=e.direction==='tribute'?'#ff8a65':'#81c784';summary+='<div style="margin:4px 0;font-size:11px;color:rgba(255,255,255,.7)"><b>'+(e.fromName||PN[e.from])+'</b> <span style="color:'+lblCol+'">['+lbl+']</span> → <b>'+(e.toName||PN[e.to])+'</b>: <span style="color:'+col+';font-weight:700">'+RN[e.card.r]+(SYM[e.card.suit]||'')+'</span></div>'}showOv('<div class="m"><h2>上供完成</h2>'+summary+'</div>');setTimeout(()=>{hideOv()},2500);ONLINE.tributeLog=[];break}
    case 'round_end':G.ph='end';G.busy=false;G.lv=d.lv;G.stg=d.stg;G.ord=d.ord;showOnlineRes(d.result);break;
    case 'game_over':G.ph='end';G.busy=false;showOnlineGameOver(d);break;
    case 'error':toast(d.message);G.busy=false;break;
    case 'player_left':toast((ONLINE.nickNames?ONLINE.nickNames[d.seat]:'玩家')+'断开连接');break;
  }
}
function applyState(s){
  if(G.ph==='end'&&(s.ph==='tribute'||s.ph==='play'))hideOv();
  G.hd[0]=s.yourHand;
  G.turn=s.turn;G.hui=s.hui;G.ph=s.ph;
  G.lp=s.lastPlay;G.lpp=s.lastPlayPlayer;G.ps=s.passCount;
  G.dn=s.dn;G.ord=s.ord;G.rnd=s.rnd;G.noTr=s.noTr;G.win=s.win;
  if(s.playedCards)for(let i=0;i<4;i++)G.played[i]=s.playedCards[i]||[];
  if(s.seatNames)ONLINE.nickNames=s.seatNames;
  if(s.lv)G.lv=s.lv;if(s.stg)G.stg=s.stg;
  for(let p=1;p<=3;p++){let init=13;let played=G.played[p]?G.played[p].length:0;let cnt=init-played;if(cnt<0)cnt=0;if(!G.hd[p])G.hd[p]=[];while(G.hd[p].length>cnt)G.hd[p].pop();while(G.hd[p].length<cnt)G.hd[p].push({suit:'_fill',r:0,id:'_fill_'+p+'_'+G.hd[p].length})}
  G.sel=[];G.busy=false;render();
}
function showWaitingRoom(players){
  if(!players)return;
  let slots=players.map((p,i)=>{let cls=p.isAI?'filled':(i===0?'host':'filled');let icon=i===0?'👑 ':'';let name=p.nickname||p.nick||('座位'+i);return`<div class="player-slot ${cls}">${icon}${name}${p.isAI?' (AI)':''}</div>`}).join('');
  let count=players.filter(p=>!p.isAI).length;
  let total=players.length;
  let code=ONLINE.code||'';
  let btns='';
  if(ONLINE.mySeat===0){
    if(total>=2)btns+=`<button class="lobby-btn secondary" style="padding:8px;font-size:11px" onclick="wsSend('fill_ai')">空位补AI</button>`;
    if(total>=4)btns+=`<button class="lobby-btn primary" onclick="wsSend('start_game')">开始游戏</button>`;
    else if(total<2)btns+=`<p class="det">等待玩家加入 (${count}人)...</p>`;
    else btns+=`<p class="det">${total}人就位, 可补AI或直接开始</p>`;
  } else {
    btns=`<p class="det">等待房主操作...</p>`;
  }
  let shareUrl=window.location.origin+window.location.pathname+'?mode=online&room='+code;
  showOv(`<div class="m"><h2>房间 ${code}</h2><div class="room-id">${code}</div><p class="det">分享房间号给朋友</p><div style="margin:6px 0"><input class="lobby-input" id="shareLink" value="${shareUrl}" readonly onclick="this.select()" style="font-size:10px;color:#90caf9"></div><button class="lobby-btn secondary" style="padding:8px;font-size:11px" onclick="navigator.clipboard.writeText(document.getElementById('shareLink').value).then(()=>toast('已复制'))">复制邀请链接</button><div class="player-slots">${slots}</div>${btns}<button class="lobby-btn secondary" style="margin-top:12px" onclick="leaveRoom()">离开房间</button></div>`);
}
async function createRoom(nick){
  try{await connectWS();ONLINE.nick=nick;ONLINE.mySeat=0;ONLINE.active=true;
  wsSend('create_room',{nickname:nick});$('connStatus').className='online';$('connStatus').textContent='已连接'}
  catch(e){showOv(`<div class="m"><h2>建房失败</h2><p>${e.message}</p><button onclick="hideOv();showLobby()">返回</button></div>`)}
}
async function joinRoom(code,nick){
  try{await connectWS();ONLINE.nick=nick;ONLINE.active=true;
  wsSend('join_room',{code:code.toUpperCase(),nickname:nick});$('connStatus').className='online';$('connStatus').textContent='已连接'}
  catch(e){showOv(`<div class="m"><h2>加入失败</h2><p>${e.message}</p><button onclick="hideOv();showLobby()">返回</button></div>`)}
}
function leaveRoom(){
  if(ONLINE.ws){ONLINE.ws.close();ONLINE.ws=null}
  clearTimeout(ONLINE.reconnectTimer);
  ONLINE.active=false;ONLINE.mySeat=-1;ONLINE.code=null;ONLINE.playerId=null;ONLINE.nickNames=null;ONLINE.roomPlayers=null;
  $('connStatus').className='offline';$('connStatus').textContent='单机模式';
  showLobby();
}
function handleInterruptReq(d){
  if(d.interruptType==='cha'){
    askHumanCha(d.srcPlayer,d.srcCard,d.yourFours).then(didCha=>{wsSend(didCha?'cha_yes':'cha_no',{})});
  } else if(d.interruptType==='dian'){
    askHumanDian().then(didDian=>{wsSend(didDian?'dian_yes':'dian_no',{})});
  }
}
function handleTributeReq(d){
  pickDlg(d.title||'选牌',d.desc||'选择一张牌',G.hd[0]).then(card=>{wsSend(d.direction==='tribute'?'tribute_pick':'return_pick',{card:card.id})});
}
function showOnlineRes(r){
  let ls=`我方:${LN[G.lv[0]]||'过关'} | 对方:${LN[G.lv[1]]||'过关'}`;
  let dem=r.dem?'<p style="color:#ff5722;font-weight:700">降级! 本局免上供</p>':'';
  let upInfo=r.sameTeam?'<p style="color:#81c784">保持台上, 免上供</p>':(r.upgraded?(r.dbl?'<p>升2级</p>':'<p>升1级</p>'):(r.up?'<p style="color:#81c784">保持台上, 免疫等级未升级</p>':'<p>上台(未升级)</p>'));
  showOv(`<div class="m"><h2>本局结束</h2><p>${r.msg}</p>${upInfo}<p class="det">${ls}</p>${dem}<p class="det" style="margin-top:8px">等待下一局...</p></div>`);
}
function showOnlineGameOver(d){
  let w=d.winner==='A'?'我方':'对方';
  let ls=`我方:${LN[G.lv[0]]||'过关'} | 对方:${LN[G.lv[1]]||'过关'}`;
  showOv(`<div class="m"><div class="big">🎉</div><h2>${w}最终胜利!</h2><p class="det">${ls}</p><button onclick="hideOv();leaveRoom()">返回大厅</button></div>`);
}
function showLobby(){showOv(`<div class="m"><h2>144</h2><p>四人两两队 · 从3打到A</p><p style="font-size:10px;color:rgba(255,255,255,.4);text-align:left;line-height:1.8">· 对家同组, 在台上赢了才能升级<br>· <b style="color:#ffa726">三条=炸弹, 四条=更大炸弹</b><br>· 双王>四条, A44>一切<br>· <b style="color:#81c784">单龙: 3+张连续,不含会儿</b><br>· 会儿牌比2大比王小<br>· 出单4→对4「岔」, 岔后单4「点」<br>· <b style="color:#ffa726">从3必须双抓才能升5</b><br>· 10和K只能升一级, J被双抓→降到3</p><button class="lobby-btn primary" onclick="hideOv();newGame()">单机模式(AI)</button><button class="lobby-btn online" onclick="showOnlineSetup()">联机模式</button></div>`)}
function showOnlineSetup(){let savedNick=localStorage.getItem('nick')||'';let connected=ONLINE.active?'<span style="color:#81c784">✓ 已连接</span>':'';showOv(`<div class="m"><h2>联机模式</h2><div style="margin:10px 0"><input class="lobby-input" id="cfgNick" placeholder="你的昵称" value="${savedNick}"></div>${connected}<button class="lobby-btn online" onclick="connectAndLobby()">进入大厅</button><button class="lobby-btn secondary" onclick="showLobby()">返回</button></div>`)}
function connectAndLobby(){let nick=$('cfgNick').value.trim()||'玩家';localStorage.setItem('nick',nick);ONLINE.nick=nick;showMainLobby()}
function showMainLobby(){showOv(`<div class="m"><h2>联机大厅</h2><p>昵称: <b>${ONLINE.nick}</b></p><button class="lobby-btn primary" onclick="hideOv();createRoom('${ONLINE.nick}')">创建房间</button><div style="margin:8px 0"><input class="lobby-input" id="joinId" placeholder="输入房间号加入"></div><button class="lobby-btn online" onclick="hideOv();joinRoom(document.getElementById('joinId').value,'${ONLINE.nick}')">加入房间</button><button class="lobby-btn secondary" onclick="showLobby()">返回</button></div>`)}
(function(){
  var tryFS = function(){
    var el = document.documentElement;
    var rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if(rfs){
      try{
        var p = rfs.call(el);
        if(p && p.then){ p.then(function(){
          try{ screen.orientation.lock('landscape').catch(function(){}); }catch(e){}
          setTimeout(window.reapply, 100);
        }).catch(function(){}); }
      }catch(e){}
    }
    document.removeEventListener('touchstart', tryFS);
    document.removeEventListener('click', tryFS);
    setTimeout(window.reapply, 100);
    setTimeout(window.reapply, 500);
    setTimeout(window.reapply, 1200);
  };
  document.addEventListener('touchstart', tryFS, {passive:true});
  document.addEventListener('click', tryFS);
  let params=new URLSearchParams(window.location.search);if(params.get('mode')==='online'){let savedNick=localStorage.getItem('nick')||'';if(!savedNick){showOnlineSetup();return}ONLINE.nick=savedNick;let room=params.get('room');if(room){joinRoom(room,savedNick)}else{showMainLobby()}}else{showLobby()}
})()
</script>
