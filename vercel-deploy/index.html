<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>144</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
body{background:#0a2e14;color:#fff;display:flex;flex-direction:column;height:100dvh}

/* ========== 顶栏 ========== */
#hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:linear-gradient(180deg,rgba(0,0,0,.65),rgba(0,0,0,.35));flex-shrink:0;gap:6px;border-bottom:1px solid rgba(255,215,0,.12)}
.hb{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;text-align:center;line-height:1.3;min-width:62px}
#hs{background:linear-gradient(135deg,rgba(33,150,243,.18),rgba(33,150,243,.08));border:1px solid rgba(33,150,243,.35);color:#90caf9}
#hs .big{font-size:15px;color:#64b5f6;display:block}
#hh{background:linear-gradient(135deg,rgba(255,152,0,.2),rgba(255,152,0,.08));border:1px solid rgba(255,152,0,.4);color:#ffb74d}
#hh .big{font-size:17px;color:#ffa726;display:block;text-shadow:0 0 8px rgba(255,167,38,.4)}
.lv{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600}
.lu{background:linear-gradient(135deg,rgba(33,150,243,.15),rgba(33,150,243,.05));border:1px solid rgba(33,150,243,.3);color:#90caf9}
.lt{background:linear-gradient(135deg,rgba(244,67,54,.15),rgba(244,67,54,.05));border:1px solid rgba(244,67,54,.3);color:#ef9a9a}

/* ========== 牌桌 ========== */
#tbl{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;background:radial-gradient(ellipse at 50% 45%,#1b6b35 0%,#145a2a 35%,#0d4420 65%,#082e14 100%)}

/* AI行 */
.ar{display:flex;justify-content:center;flex-shrink:0;padding:2px 0}
.ab{text-align:center;width:100%;max-width:360px}
.al{font-size:10px;padding:2px 8px;border-radius:10px;display:inline-flex;align-items:center;gap:4px;font-weight:600}
.al.tm{background:linear-gradient(135deg,rgba(33,150,243,.2),rgba(33,150,243,.08));color:#64b5f6;border:1px solid rgba(33,150,243,.25)}
.al.op{background:linear-gradient(135deg,rgba(244,67,54,.2),rgba(244,67,54,.08));color:#ef9a9a;border:1px solid rgba(244,67,54,.25)}
.al .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#ff9800;animation:bk .8s infinite}
@keyframes bk{0%,100%{opacity:1;box-shadow:0 0 4px #ff9800}50%{opacity:.2;box-shadow:none}}
.bkr{display:flex;justify-content:center;height:18px;margin:1px 0}
.bkr i{display:block;width:13px;height:17px;background:linear-gradient(135deg,#1a237e,#283593);border:1px solid #5c6bc0;border-radius:2px;margin-left:-5px;box-shadow:0 1px 2px rgba(0,0,0,.3)}
.bkr i:first-child{margin-left:0}

/* 出过的牌(平铺历史) */
.pc{display:flex;flex-wrap:wrap;justify-content:center;gap:1px;padding:2px 6px;max-height:48px;overflow-y:auto;background:rgba(0,0,0,.08);border-radius:6px;margin:1px 4px}
.pc:empty{min-height:0;background:none}

/* 中间行 */
#mr{flex:1;display:flex;align-items:stretch;min-height:0;gap:4px;padding:0 4px}
.sa{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;width:84px;flex-shrink:0;padding-top:4px;overflow:hidden}
#ca{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.12);border-radius:12px;margin:3px 0;padding:6px;min-width:0;border:1px solid rgba(255,255,255,.04);position:relative;overflow:hidden}
#ca .who{font-size:10px;color:rgba(255,255,255,.5);font-weight:600}
#ca .cp{display:flex;justify-content:center;gap:2px;flex-wrap:wrap;margin:4px 0;position:relative;z-index:1}
#ca .tp{font-size:10px;color:#ffd54f;font-weight:600;text-shadow:0 0 6px rgba(255,213,79,.3)}
.ap{display:flex;justify-content:center;gap:2px;min-height:28px;align-items:center;flex-wrap:wrap;padding:2px}
.ap .pl{font-size:10px;color:rgba(255,255,255,.35);font-style:italic}
.ap .pl-txt{font-size:10px;color:rgba(255,255,255,.4);padding:2px 8px;background:rgba(0,0,0,.15);border-radius:8px}

/* ========== 底部 ========== */
#bot{flex-shrink:0;background:linear-gradient(180deg,rgba(0,0,0,.2),rgba(0,0,0,.4));border-top:1px solid rgba(255,255,255,.06);padding-bottom:env(safe-area-inset-bottom,2px)}
#mi{display:flex;justify-content:space-between;padding:3px 10px;font-size:10px}
#mi .me{color:#ffd54f;font-weight:700}
#mp{display:flex;justify-content:center;gap:2px;min-height:28px;align-items:center;padding:2px 0}
#ppc{display:flex;flex-wrap:wrap;justify-content:center;gap:1px;padding:2px 8px;max-height:40px;overflow-y:auto;border-bottom:1px solid rgba(255,255,255,.03);background:rgba(0,0,0,.06);border-radius:6px;margin:0 4px}
#ppc:empty{background:none}
#hw{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:3px 6px}
#hand{display:flex;justify-content:center;align-items:flex-end;min-height:80px}

/* ========== 操作栏 ========== */
#bar{display:flex;gap:6px;justify-content:center;padding:5px 8px;padding-bottom:max(5px,env(safe-area-inset-bottom));flex-shrink:0;background:linear-gradient(180deg,rgba(0,0,0,.3),rgba(0,0,0,.55))}
#bar button{padding:11px 0;border:none;border-radius:20px;font-size:12px;font-weight:800;cursor:pointer;flex:1;max-width:88px;transition:transform .12s,box-shadow .12s;letter-spacing:.5px}
#bar button:active{transform:scale(.92)}
#bar button:disabled{opacity:.2;transform:none}
.bp{background:linear-gradient(135deg,#e65100,#ff8f00);color:#fff;box-shadow:0 2px 8px rgba(255,143,0,.35)}
.bs{background:rgba(255,255,255,.08);color:#aaa;border:1px solid rgba(255,255,255,.1)!important}
.bh{background:rgba(255,255,255,.05);color:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.06)!important;font-size:10px}
.bc{background:linear-gradient(135deg,#c2185b,#f06292);color:#fff;font-size:14px;letter-spacing:2px;box-shadow:0 2px 10px rgba(240,98,146,.4)}
.bd{background:linear-gradient(135deg,#6a1b9a,#ab47bc);color:#fff;font-size:14px;letter-spacing:2px;box-shadow:0 2px 10px rgba(171,71,188,.4)}

/* ========== 牌 ========== */
.c{width:42px;height:58px;background:linear-gradient(180deg,#fff 0%,#f8f8f8 100%);border-radius:5px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;cursor:pointer;transition:transform .15s cubic-bezier(.4,0,.2,1),box-shadow .15s;box-shadow:0 2px 5px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.8);position:relative;flex-shrink:0;user-select:none;border:2px solid rgba(0,0,0,.06);margin-left:-13px}
.c:first-child{margin-left:0}
.c.r{color:#c62828}.c.b{color:#263238}
.c.sel{transform:translateY(-12px);border-color:#ffc107;box-shadow:0 6px 16px rgba(255,193,7,.4),inset 0 1px 0 rgba(255,255,255,.8)}
.c .v{font-size:13px;line-height:1}.c .s{font-size:14px;line-height:1;margin-top:1px}
.c.hui{background:linear-gradient(180deg,#fff8e1 0%,#ffe082 100%);border-color:rgba(255,160,0,.3)}
.c.hui::after{content:"会";position:absolute;top:1px;right:2px;font-size:6px;color:#e65100;font-weight:900}
.c.jr{background:linear-gradient(180deg,#fff 0%,#ffcdd2 100%);color:#b71c1c;border-color:rgba(183,28,28,.15)}
.c.jb{background:linear-gradient(180deg,#fff 0%,#cfd8dc 100%);color:#37474f;border-color:rgba(55,71,79,.15)}
/* 小牌(出牌展示) */
.c.sm{width:28px;height:38px;margin-left:-6px;cursor:default;pointer-events:none}
.c.sm .v{font-size:9px}.c.sm .s{font-size:10px}
/* 迷你牌(历史平铺) */
.c.mn{width:20px;height:28px;margin-left:-5px;cursor:default;pointer-events:none;border-width:1px;font-size:7px}
.c.mn:first-child{margin-left:0}
.c.mn .v{font-size:7px}.c.mn .s{font-size:8px}
.c.mn.hui::after{font-size:4px}

/* ========== 弹窗 ========== */
#ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
#ov.h{display:none}
.m{background:linear-gradient(180deg,#2e3b42 0%,#1a2429 100%);border-radius:16px;padding:20px;width:100%;max-width:340px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.06)}
.m h2{font-size:17px;margin-bottom:8px;color:#ffd54f;text-shadow:0 0 10px rgba(255,213,79,.2)}
.m p{font-size:12px;color:rgba(255,255,255,.7);margin-bottom:5px;line-height:1.6}
.m .big{font-size:30px;margin:6px 0}
.m .det{font-size:10px;color:rgba(255,255,255,.4)}
.m button{padding:11px 24px;border:none;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;margin:5px;background:linear-gradient(135deg,#e65100,#ff8f00);color:#fff;transition:transform .1s;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.m button:active{transform:scale(.95)}
.m button.alt{background:rgba(255,255,255,.1);color:#bbb;border:1px solid rgba(255,255,255,.12)}
.m button.cha-btn{background:linear-gradient(135deg,#c2185b,#f06292);color:#fff;font-size:16px;letter-spacing:2px;box-shadow:0 3px 12px rgba(240,98,146,.4)}
.m button.dian-btn{background:linear-gradient(135deg,#6a1b9a,#ab47bc);color:#fff;font-size:16px;letter-spacing:2px;box-shadow:0 3px 12px rgba(171,71,188,.4)}
.m .cpick{display:flex;flex-wrap:wrap;justify-content:center;gap:3px;margin:10px 0;max-height:160px;overflow-y:auto}
.m .cpick .c{cursor:pointer;margin-left:-3px}.m .cpick .c:first-child{margin-left:0}
.m .cpick .c.sel{border-color:#e91e63}
.m .played-show{display:flex;justify-content:center;gap:3px;margin:8px 0;flex-wrap:wrap}

/* toast */
#toast{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,rgba(0,0,0,.9),rgba(30,30,30,.9));color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:200;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap;border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 20px rgba(0,0,0,.5);text-shadow:0 1px 3px rgba(0,0,0,.5)}
#toast.show{opacity:1}

/* ========== 动画效果 ========== */
@keyframes bombShake{0%,100%{transform:translate(0,0)}10%{transform:translate(-3px,-2px)}20%{transform:translate(3px,2px)}30%{transform:translate(-2px,3px)}40%{transform:translate(2px,-3px)}50%{transform:translate(-3px,1px)}60%{transform:translate(3px,-1px)}70%{transform:translate(-1px,3px)}80%{transform:translate(1px,-2px)}90%{transform:translate(-2px,2px)}}
@keyframes bombFlash{0%{box-shadow:inset 0 0 0 rgba(255,69,0,0),0 0 0 rgba(255,69,0,0)}30%{box-shadow:inset 0 0 60px rgba(255,69,0,.35),0 0 30px rgba(255,69,0,.3)}100%{box-shadow:inset 0 0 0 rgba(255,69,0,0),0 0 0 rgba(255,69,0,0)}}
@keyframes cardIn{0%{opacity:0;transform:translateY(10px) scale(.9)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes typeFlash{0%{box-shadow:inset 0 0 0 rgba(255,215,0,0)}35%{box-shadow:inset 0 0 50px rgba(255,215,0,.25)}100%{box-shadow:inset 0 0 0 rgba(255,215,0,0)}}
@keyframes chaFlash{0%{box-shadow:inset 0 0 0 rgba(240,98,146,0)}35%{box-shadow:inset 0 0 60px rgba(240,98,146,.35)}100%{box-shadow:inset 0 0 0 rgba(240,98,146,0)}}
.bomb-shake{animation:bombShake .5s ease-in-out}
.bomb-flash{animation:bombFlash .6s ease-out}
.card-in{animation:cardIn .3s ease-out}
.type-flash{animation:typeFlash .5s ease-out}
.cha-flash{animation:chaFlash .5s ease-out}

/* 屏幕适配 */
@media(max-width:360px){.c{width:36px;height:50px;margin-left:-11px}.c .v{font-size:11px}.c .s{font-size:12px}.c.sm{width:24px;height:32px;margin-left:-5px}.c.mn{width:18px;height:25px;margin-left:-4px}.sa{width:72px}}
@media(min-height:700px){#hand{min-height:88px}.c{height:62px}}

/* 当前出牌者高亮 */
@keyframes turnGlow{0%,100%{box-shadow:inset 0 0 8px rgba(255,215,0,.08)}50%{box-shadow:inset 0 0 20px rgba(255,215,0,.2)}}
.turn-active{animation:turnGlow 1.5s ease-in-out infinite;border-radius:8px;position:relative}
.turn-active::before{content:'';position:absolute;inset:-1px;border-radius:8px;border:1.5px solid rgba(255,215,0,.25);pointer-events:none}
#bot.turn-active{background:linear-gradient(180deg,rgba(255,215,0,.06),rgba(0,0,0,.4))}

/* 联机大厅 */
.lobby-btn{display:block;width:100%;padding:14px;margin:8px 0;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:transform .1s}
.lobby-btn:active{transform:scale(.96)}
.lobby-btn.primary{background:linear-gradient(135deg,#e65100,#ff8f00);color:#fff;box-shadow:0 3px 12px rgba(255,143,0,.3)}
.lobby-btn.secondary{background:rgba(255,255,255,.08);color:#ccc;border:1px solid rgba(255,255,255,.12)}
.lobby-btn.online{background:linear-gradient(135deg,#1565c0,#42a5f5);color:#fff;box-shadow:0 3px 12px rgba(66,165,245,.3)}
.lobby-input{width:100%;padding:10px 14px;border:1px solid rgba(255,255,255,.15);border-radius:10px;background:rgba(0,0,0,.3);color:#fff;font-size:13px;margin:6px 0;outline:none}
.lobby-input:focus{border-color:rgba(66,165,245,.5)}
.lobby-input::placeholder{color:rgba(255,255,255,.3)}
#connStatus{position:fixed;top:4px;right:8px;font-size:9px;padding:2px 8px;border-radius:6px;z-index:50;pointer-events:none}
#connStatus.online{background:rgba(76,175,80,.2);color:#81c784;border:1px solid rgba(76,175,80,.3)}
#connStatus.offline{background:rgba(158,158,158,.15);color:#999;border:1px solid rgba(158,158,158,.2)}
#connStatus.error{background:rgba(244,67,54,.2);color:#ef9a9a;border:1px solid rgba(244,67,54,.3)}
.room-id{font-size:22px;font-weight:900;color:#64b5f6;letter-spacing:3px;margin:8px 0;text-shadow:0 0 10px rgba(100,181,246,.3)}
.player-slots{display:flex;gap:6px;justify-content:center;margin:10px 0;flex-wrap:wrap}
.player-slot{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;min-width:60px;text-align:center}
.player-slot.filled{background:rgba(76,175,80,.15);color:#81c784;border:1px solid rgba(76,175,80,.3)}
.player-slot.empty{background:rgba(255,255,255,.05);color:rgba(255,255,255,.3);border:1px dashed rgba(255,255,255,.1)}
.player-slot.host{background:rgba(255,193,7,.15);color:#ffd54f;border:1px solid rgba(255,193,7,.3)}
</style>
</head>
<body>
<div id="connStatus" class="offline">单机模式</div>
<div id="hdr">
  <div class="hb" id="hs"><span>台上</span><span class="big" id="stTxt">--</span></div>
  <div style="display:flex;flex-direction:column;gap:3px"><span class="lv lu" id="lU">我方:3</span><span class="lv lt" id="lT">对方:3</span></div>
  <div class="hb" id="hh"><span>会儿</span><span class="big" id="hTxt">3</span></div>
</div>
<div id="tbl">
  <div class="ar"><div class="ab" id="b2"><span class="al tm" id="n2">队友(对面)</span><div class="bkr" id="k2"></div><div class="ap" id="a2"></div><div class="pc" id="pc2"></div></div></div>
  <div id="mr">
    <div class="sa" id="b1"><span class="al op" id="n1">对手(左)</span><div class="bkr" id="k1"></div><div class="ap" id="a1"></div><div class="pc" id="pc1"></div></div>
    <div id="ca"><div class="who" id="cw"></div><div class="cp" id="cc"></div><div class="tp" id="ct"></div></div>
    <div class="sa" id="b3"><span class="al op" id="n3">对手(右)</span><div class="bkr" id="k3"></div><div class="ap" id="a3"></div><div class="pc" id="pc3"></div></div>
  </div>
  <div id="bot">
    <div id="mi"><span class="me" id="ml">我(0)</span><span id="ms"></span></div>
    <div id="mp"></div>
    <div id="ppc"></div>
    <div id="hw"><div id="hand"></div></div>
  </div>
</div>
<div id="bar">
  <button class="bh" id="bH" onclick="actHint()">提示</button>
  <button class="bs" id="bPs" onclick="actPass()" disabled>不出</button>
  <button class="bp" id="bP" onclick="actPlay()">出牌</button>
</div>
<div id="ov" class="h"></div>
<div id="toast"></div>

<script>
const S=['hearts','diamonds','clubs','spades'],SYM={hearts:'♥',diamonds:'♦',clubs:'♣',spades:'♠'},
RN={3:'3',4:'4',5:'5',6:'6',7:'7',8:'8',9:'9',10:'10',11:'J',12:'Q',13:'K',14:'A',15:'2',16:'小王',17:'大王'},
LN={3:'3',4:'4',5:'5',6:'6',7:'7',8:'8',9:'9',10:'10',11:'J',12:'Q',13:'K',14:'A'},
PN=['你','左对手','队友','右对手'],
TCN={single:'单张',pair:'对子',straight:'单龙',t32:'三带二',b3:'炸弹',b4:'大炸弹',dj:'双王',a44:'A44'};
function red(s){return s==='hearts'||s==='diamonds'}
function shuf(a){for(let i=a.length-1;i>0;i--){let j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}
function $(id){return document.getElementById(id)}
function sl(ms){return new Promise(r=>setTimeout(r,ms))}

// ====== 状态 ======
let G={ph:'idle',turn:0,lv:[3,3,3,3],stg:[true,false,true,false],
  hd:[[],[],[],[]],hui:3,lp:null,lpp:-1,ps:0,
  dn:[false,false,false,false],ord:[],
  played:[[],[],[],[]],
  sel:[],hnt:0,busy:false,rnd:0,noTr:false,win:-1};

// ====== 牌力 ======
function ef(c,h){if(c.r===16)return 16;if(c.r===17)return 17;if(c.r===h&&c.r>=3&&c.r<=14)return 15.5;return c.r}
function isH(c,h){return c.r===h&&c.r>=3&&c.r<=14}
function srt(hd,h){return hd.slice().sort((a,b)=>{let x=ef(a,h),y=ef(b,h);return x!==y?x-y:S.indexOf(a.suit)-S.indexOf(b.suit)})}

// ====== 发牌 ======
function deal(){let dk=shuf((()=>{let d=[];for(let s of S)for(let r=3;r<=15;r++)d.push({suit:s,r,id:s+'_'+r});d.push({suit:'joker',r:16,id:'jb'},{suit:'joker',r:17,id:'jr'});return d})()),h=[[],[],[],[]];for(let i=0;i<52;i++)h[i%4].push(dk[i]);let lf=[dk[52],dk[53]],h3=-1;for(let p=0;p<4;p++)if(h[p].some(c=>c.suit==='hearts'&&c.r===3)){h3=p;break}if(h3<0)h3=0;h[h3].push(...lf);for(let p=0;p<4;p++)h[p]=srt(h[p],G.hui);G.hd=h;G.dn=[false,false,false,false];G.ord=[];G.lp=null;G.lpp=-1;G.ps=0;G.sel=[];G.played=[[],[],[],[]];return h3}

// ====== 牌型 ======
function detect(cards,h){
  if(!cards||!cards.length)return null;let n=cards.length;
  if(n===3){let hasA=cards.some(c=>c.r===14),fs=cards.filter(c=>c.r===4);if(hasA&&fs.length===2){let ar=cards.every(c=>red(c.suit));return{type:'a44',rk:ar?300:299,cards}}}
  if(n===1)return{type:'single',rk:ef(cards[0],h),cards};
  if(n===2){if(cards[0].r===cards[1].r)return{type:'pair',rk:ef(cards[0],h),cards};if(cards.some(c=>c.r===16)&&cards.some(c=>c.r===17))return{type:'dj',rk:250,cards};return null}
  if(n===3&&cards.every(c=>c.r===cards[0].r))return{type:'b3',rk:ef(cards[0],h),cards};
  if(n===4&&cards.every(c=>c.r===cards[0].r))return{type:'b4',rk:ef(cards[0],h),cards};
  if(n===5){let cnt={};cards.forEach(c=>cnt[c.r]=(cnt[c.r]||0)+1);let tr=Object.entries(cnt).find(e=>e[1]===3),pr=Object.entries(cnt).find(e=>e[1]===2);if(tr&&pr){let tc=cards.find(c=>c.r===+tr[0]);return{type:'t32',rk:ef(tc,h),cards}}}
  // 单龙(straight): 3+张连续,不能包含会儿
  if(n>=3){
    let noHui=cards.every(c=>!isH(c,h));
    if(noHui){
      let ranks=cards.map(c=>c.r).sort((a,b)=>a-b);
      let noDup=true;for(let i=0;i<ranks.length-1;i++)if(ranks[i]===ranks[i+1]){noDup=false;break}
      if(noDup&&ranks[ranks.length-1]-ranks[0]===n-1){
        return{type:'straight',rk:ranks[ranks.length-1],cards}
      }
    }
  }
  return null;
}

// ====== 比较 ======
const BM=['b3','b4','dj','a44'],BO={b3:1,b4:2,dj:3,a44:4};
function beats(np,lp){
  if(!lp)return true;
  let ni=BM.includes(np.type)?BO[np.type]:0,li=BM.includes(lp.type)?BO[lp.type]:0;
  if(ni&&li){if(ni!==li)return ni>li;return np.rk>lp.rk}
  if(ni)return true;if(li)return false;
  if(np.type!==lp.type)return false;if(np.cards.length!==lp.cards.length)return false;
  return np.rk>lp.rk;
}

// ====== AI ======
function allPlays(hand,lp,h){
  let ps=[],s=srt(hand,h),rc={};s.forEach(c=>{if(!rc[c.r])rc[c.r]=[];rc[c.r].push(c)});
  if(!lp){
    let seen=new Set();for(let c of s){if(!seen.has(c.r)){ps.push({type:'single',rk:ef(c,h),cards:[c]});seen.add(c.r)}}
    for(let[r,cs]of Object.entries(rc)){
      if(cs.length>=2)ps.push({type:'pair',rk:ef(cs[0],h),cards:cs.slice(0,2)});
      if(cs.length>=3)ps.push({type:'b3',rk:ef(cs[0],h),cards:cs.slice(0,3)});
      if(cs.length>=4)ps.push({type:'b4',rk:ef(cs[0],h),cards:cs.slice(0,4)});
    }
    for(let[r,cs]of Object.entries(rc))if(cs.length>=3){let pe=Object.entries(rc).find(([r2,c2])=>+r2!==+r&&c2.length>=2);if(pe)ps.push({type:'t32',rk:ef(cs[0],h),cards:[...cs.slice(0,3),...pe[1].slice(0,2)]})}
    // 单龙: 3+张连续,不含会儿
    {let uR=Object.keys(rc).map(Number).filter(r=>r!==h&&r>=3&&r<=15).sort((a,b)=>a-b);
    for(let si=0;si<uR.length;si++){let straight=[],end=si;
      while(end<uR.length&&uR[end]===uR[si]+(end-si)&&uR[end]<=14){straight.push(rc[uR[end]][0]);end++;
        if(straight.length>=3)ps.push({type:'straight',rk:uR[end-1],cards:straight.slice()})
      }
    }}
    let ac=s.filter(c=>c.r===14),fc=s.filter(c=>c.r===4);if(ac.length&&fc.length>=2){let a=[ac[0],fc[0],fc[1]];ps.push({type:'a44',rk:a.every(c=>red(c.suit))?300:299,cards:a})}
    let bj=s.find(c=>c.r===16),rj=s.find(c=>c.r===17);if(bj&&rj)ps.push({type:'dj',rk:250,cards:[bj,rj]});
    return ps;
  }
  let lt=lp.type,lr=lp.rk,lB=BM.includes(lt);
  if(!lB){
    if(lt==='single')for(let c of s)if(ef(c,h)>lr)ps.push({type:'single',rk:ef(c,h),cards:[c]});
    if(lt==='pair')for(let[r,cs]of Object.entries(rc))if(cs.length>=2&&ef(cs[0],h)>lr)ps.push({type:'pair',rk:ef(cs[0],h),cards:cs.slice(0,2)});
    if(lt==='t32')for(let[r,cs]of Object.entries(rc))if(cs.length>=3&&ef(cs[0],h)>lr){let pe=Object.entries(rc).find(([r2,c2])=>+r2!==+r&&c2.length>=2);if(pe)ps.push({type:'t32',rk:ef(cs[0],h),cards:[...cs.slice(0,3),...pe[1].slice(0,2)]})}
    // 跟单龙: 同长度更高的单龙
    if(lt==='straight'){let ln=lp.cards.length;
      let uR=Object.keys(rc).map(Number).filter(r=>r!==h&&r>=3&&r<=14).sort((a,b)=>a-b);
      for(let si=0;si<=uR.length-ln;si++){
        let ok=true;for(let j=0;j<ln;j++){if(uR[si+j]!==uR[si]+j){ok=false;break}}
        if(ok&&uR[si+ln-1]>lr){let st=[];for(let j=0;j<ln;j++)st.push(rc[uR[si+j]][0]);ps.push({type:'straight',rk:uR[si+ln-1],cards:st})}
      }
    }
  }
  // 炸弹
  for(let[r,cs]of Object.entries(rc)){
    if(cs.length>=3&&(!lB||BO.b3>BO[lt]||(BO.b3===BO[lt]&&ef(cs[0],h)>lr)))ps.push({type:'b3',rk:ef(cs[0],h),cards:cs.slice(0,3)});
    if(cs.length>=4&&(!lB||BO.b4>BO[lt]||(BO.b4===BO[lt]&&ef(cs[0],h)>lr)))ps.push({type:'b4',rk:ef(cs[0],h),cards:cs.slice(0,4)});
  }
  if(!lB||BO.dj>BO[lt]){let bj=s.find(c=>c.r===16),rj=s.find(c=>c.r===17);if(bj&&rj)ps.push({type:'dj',rk:250,cards:[bj,rj]})}
  if(!lB||BO.a44>BO[lt]){let ac=s.filter(c=>c.r===14),fc=s.filter(c=>c.r===4);if(ac.length&&fc.length>=2){let a=[ac[0],fc[0],fc[1]];ps.push({type:'a44',rk:a.every(c=>red(c.suit))?300:299,cards:a})}}
  if(lt==='a44'){let ac=s.filter(c=>c.r===14),fc=s.filter(c=>c.r===4);if(ac.length&&fc.length>=2){let a=[ac[0],fc[0],fc[1]],ar=a.every(c=>red(c.suit)),rk=ar?300:299;if(rk>lr)ps.push({type:'a44',rk,cards:a})}}
  return ps;
}
function aiPick(pi){
  let hand=G.hd[pi];if(!hand.length)return null;let free=!G.lp||G.lpp===pi,plays=allPlays(hand,free?null:G.lp,G.hui);
  if(!plays.length)return null;let nb=plays.filter(p=>!BM.includes(p.type)),bm=plays.filter(p=>BM.includes(p.type));
  if(free){if(nb.length){nb.sort((a,b)=>a.rk-b.rk);return nb[0]}bm.sort((a,b)=>a.rk-b.rk);return bm[0]}
  if(G.lpp%2===pi%2)return null;
  if(nb.length){nb.sort((a,b)=>a.rk-b.rk);return nb[0]}
  if(hand.length<=4){bm.sort((a,b)=>a.rk-b.rk);return bm[0]}
  return null;
}

function playFX(type){

    ov.className=type==='a44'?'cha-flash':'bomb-flash';
    ca.appendChild(ov);
    setTimeout(()=>{ca.classList.remove('bomb-shake');ov.remove()},650);
    return;
  }
  // 岔 → 粉色闪光
  if(type==='cha'){
    let ov=document.createElement('div');
    ov.style.cssText='position:absolute;inset:0;border-radius:12px;pointer-events:none;z-index:5';
    ov.className='cha-flash';
    ca.appendChild(ov);

  }

  if(type==='dian'){

    ov.style.cssText='position:absolute;inset:0;border-radius:12px;pointer-events:none;z-index:5;background:rgba(156,39,176,.15)';
    ca.appendChild(ov);
    ov.animate([{opacity:1},{opacity:0}],{duration:500,fill:'forwards'});

  let ov=document.createElement('div');
  ov.style.cssText='position:absolute;inset:0;border-radius:12px;pointer-events:none;z-index:5';
  ov.className='type-flash';
  ca.appendChild(ov);
  setTimeout(()=>ov.remove(),550);
}

// ====== 岔/点中断系统 ======
async function checkChaDian(srcPlayer, play){
  if(play.type!=='single'||play.cards[0].r!==4) return false;

  let srcCard=play.cards[0];
  let chaPlayer=-1;

  // 通知: 检测到单4,开始检查岔
  toast('单4! 检查岔...',800);
  await sl(400);

  // 先检查是否有人能对4岔
  let anyoneCanCha=false;
  for(let i=1;i<=3;i++){
    let p=(srcPlayer+i)%4;
    if(G.dn[p]) continue;
    let fs=G.hd[p].filter(c=>c.r===4);
    if(fs.length>=2){anyoneCanCha=true;break}
  }

  if(!anyoneCanCha){
    toast('无人可岔');
    await sl(500);
    return false;
  }

  // 按座位顺序问每个其他玩家是否岔(跳过出4的人)
  for(let i=1;i<=3;i++){
    let p=(srcPlayer+i)%4;
    if(G.dn[p]) continue;
    let fs=G.hd[p].filter(c=>c.r===4);
    if(fs.length<2) continue;

    if(p===0){
      let didCha=await askHumanCha(srcPlayer,srcCard,fs);
      if(didCha){chaPlayer=0;break}
    } else {
      if(Math.random()>0.3){
        let chaPlay={type:'pair',rk:ef(fs[0],G.hui),cards:fs.slice(0,2)};
        execPlay(p,chaPlay);showAP(p,chaPlay.cards,false);
        playFX('cha');
        showOv(`<div class="m"><h2 style="color:#f06292;font-size:20px">岔!</h2><p>${PN[p]}用一对4做了「岔」</p><div class="played-show">${fs.slice(0,2).map(c=>`<div class="c ${red(c.suit)?'r':'b'} sm"><span class="v">${RN[c.r]}</span><span class="s">${SYM[c.suit]||''}</span></div>`).join('')}</div><button onclick="hideOv();window._cc&&window._cc()">继续</button></div>`);
        await new Promise(r=>{window._cc=()=>r()});
        chaPlayer=p;break;
      } else {
        showOv(`<div class="m"><h2>岔?</h2><p>${PN[srcPlayer]}出了单4 ${SYM[srcCard.suit]||''}</p><p>${PN[p]}有对4 → <b style="color:#aaa">选择不岔</b></p><button onclick="hideOv();window._cc&&window._cc()">继续</button></div>`);
        await new Promise(r=>{window._cc=()=>r()});
      }
    }
  }

  if(chaPlayer<0){ toast('无人岔');await sl(400);return false; }

  // 岔成功 → 按顺序问其他人是否点
  for(let i=1;i<=3;i++){
    let p=(chaPlayer+i)%4;
    if(G.dn[p]||p===chaPlayer) continue;
    let hasFour=G.hd[p].some(c=>c.r===4);
    if(!hasFour) continue;

    if(p===0){
      let didDian=await askHumanDian();
      if(didDian){G.lp=null;G.lpp=0;G.ps=0;return true}
    } else {
      if(Math.random()>0.5){
        let f=G.hd[p].find(c=>c.r===4);
        let dp={type:'single',rk:ef(f,G.hui),cards:[f]};
        execPlay(p,dp);showAP(p,dp.cards,false);
        playFX('dian');
        G.lp=null;G.lpp=p;G.ps=0;
        showOv(`<div class="m"><h2 style="color:#ab47bc;font-size:20px">点!</h2><p>${PN[p]}用单4做了「点」，抢回牌权</p><div class="played-show"><div class="c ${red(f.suit)?'r':'b'} sm"><span class="v">${RN[f.r]}</span><span class="s">${SYM[f.suit]||''}</span></div></div><button onclick="hideOv();window._cc&&window._cc()">继续</button></div>`);
        await new Promise(r=>{window._cc=()=>r()});
        return true;
      }
    }
  }

  G.lp=null;G.lpp=chaPlayer;G.ps=0;
  return true;
}

async function tributePhase(){
  G.ph='tribute';G.busy=true;
  let ft=G.ord[0]%2; // 赢的队伍
  let isDbl=G.ord.length>=2&&G.ord[0]%2===G.ord[1]%2;
  let emperor=G.ord[0]; // 皇上(第一个出完的人)

  let losers=[],winners=[];
  if(isDbl){
    // 双抓: 两个输家都上供,两个赢家都收
    for(let p=0;p<4;p++){if(p%2!==ft)losers.push(p);else winners.push(p)}
  } else {
    // 单抓: 只上供给皇上
    let lastLoser=-1;
    for(let i=G.ord.length-1;i>=0;i--){if(G.ord[i]%2!==ft){lastLoser=G.ord[i];break}}
    if(lastLoser<0){G.busy=false;return}
    losers=[lastLoser];winners=[emperor];
  }

  let title=isDbl?'双抓上供':'单抓上供';
  let sub=isDbl?'两人都要上供':`${PN[losers[0]]}上供给皇上(${PN[emperor]})`;
  showOv(`<div class="m"><h2>${title}</h2><p>${sub}</p><button onclick="hideOv();window._cc&&window._cc()">开始上供</button></div>`);
  await new Promise(r=>{window._cc=()=>r()});

  let clog=[]; // 记录所有交换

  // 上供阶段
  for(let i=0;i<losers.length;i++){
    let lo=losers[i],wi=winners[i%winners.length],hand=G.hd[lo];
    if(!hand.length)continue;
    let tc=lo===0?await pickDlg('选择上供牌',`选一张牌上供给${PN[wi]}`,hand):((s=>s[s.length-1])(srt(hand,G.hui)));
    G.hd[lo]=G.hd[lo].filter(c=>c.id!==tc.id);G.hd[wi].push(tc);
    clog.push({from:lo,to:wi,card:tc,type:'tribute'});
    let col=red(tc.suit)?'r':'b';

      <h2 style="color:#ff8a65">上供</h2>
      <p><b>${PN[lo]}</b> 上供给 <b>${PN[wi]}</b></p>
      <div class="played-show">${cardHTML}</div>
      <p class="det">${RN[tc.r]}${SYM[tc.suit]||''}</p>
      <button onclick="hideOv();window._cc&&window._cc()">继续</button>
    </div>`);
    await new Promise(r=>{window._cc=()=>r()});
  }

  // 回牌阶段
  for(let i=0;i<winners.length;i++){
    let wi=winners[i],lo=losers[i%losers.length],hand=G.hd[wi];
    if(!hand.length)continue;
    let rc=wi===0?await pickDlg('选择回牌',`选一张牌回给${PN[lo]}`,hand):srt(hand,G.hui)[0];
    G.hd[wi]=G.hd[wi].filter(c=>c.id!==rc.id);G.hd[lo].push(rc);
    clog.push({from:wi,to:lo,card:rc,type:'return'});
    let col=red(rc.suit)?'r':'b';
    let cardHTML=`<div class="c ${col} sm"><span class="v">${RN[rc.r]}</span><span class="s">${SYM[rc.suit]||''}</span></div>`;
    showOv(`<div class="m">
      <h2 style="color:#81c784">回牌</h2>
      <p><b>${PN[wi]}</b> 回给 <b>${PN[lo]}</b></p>
      <div class="played-show">${cardHTML}</div>
      <p class="det">${RN[rc.r]}${SYM[rc.suit]||''}</p>
      <button onclick="hideOv();window._cc&&window._cc()">继续</button>
    </div>`);
    await new Promise(r=>{window._cc=()=>r()});
  }

  for(let p=0;p<4;p++)G.hd[p]=srt(G.hd[p],G.hui);

  // 汇总展示
  let summary='';
  for(let e of clog){
    let col=red(e.card.suit)?'#ef9a9a':'#e0e0e0';
    let lbl=e.type==='tribute'?'上供':'回牌';

  }
  showOv(`<div class="m">
    <h2>上供完成</h2>
    ${summary}
    <div style="margin-top:10px"><button onclick="hideOv();window._cc&&window._cc()">继续游戏</button></div>
  </div>`);
  await new Promise(r=>{window._cc=()=>r()});

  render();await sl(200);G.busy=false;
}

// ====== 回合结束判定 ======
function shouldEndRound(){
  if(G.ord.length<2) return false;
  if(G.ord.length>=4) return true;
  if(G.ord.some(p=>p%2!==G.ord[0]%2)) return true;
  if(G.ord.length>=2 && G.ord[0]%2===G.ord[1]%2) return true;
  return false;
}

// ====== 主循环 ======
async function loop(){
  while(G.ph==='play'){
    render();
    if(G.dn[G.turn]){G.turn=(G.turn+1)%4;continue}
    if(G.turn===0)return;

    G.busy=true;render();await sl(400+Math.random()*300);
    let play=aiPick(G.turn);
    if(play){
      execPlay(G.turn,play);showAP(G.turn,play.cards,false);
      playFX(play.type);
      render();
      let chaDianed = await checkChaDian(G.turn, play);
      if(chaDianed){
        G.turn=G.lpp;G.busy=false;render();continue;
      }
    } else {
      execPass(G.turn);showAP(G.turn,null,true);
    }
    G.busy=false;render();
    if(G.hd[G.turn].length===0&&!G.dn[G.turn]){G.dn[G.turn]=true;G.ord.push(G.turn);toast(`${PN[G.turn]}出完了!`);await sl(300);if(shouldEndRound()){await endRound();return}}
    if(!G.lp){G.turn=G.lpp;continue}
    G.turn=(G.turn+1)%4;let s=0;while(G.dn[G.turn]&&s<4){G.turn=(G.turn+1)%4;s++}
    if(s>=4){await endRound();return}
  }
}

// ====== 玩家操作 ======
async function afterPlayerPlay(){
  if(ONLINE.active&&!ONLINE.isHost){
    // 非主机: 主机负责处理,这里只等状态更新
    G.busy=true;return;
  }
  let play=G.lp,src=G.lpp;
  if(play){
    if(!ONLINE.active){
      playFX(play.type);
      let chaDianed=await checkChaDian(src,play);
      if(chaDianed){
        G.turn=G.lpp;G.busy=false;render();
        if(G.turn===0)return;
        await loop();return;
      }
    }
  }
  let mySeat=ONLINE.active?ONLINE.mySeat:0;
  if(G.hd[mySeat].length===0&&!G.dn[mySeat]){G.dn[mySeat]=true;G.ord.push(mySeat);toast(mySeat===0?'你出完了!':`${PN[mySeat]}出完了!`);if(ONLINE.active)onlineBroadcast();if(shouldEndRound()){await endRound();if(ONLINE.active)onlineBroadcast();return}}
  if(!G.lp){G.turn=G.lpp;G.busy=false;render();if(ONLINE.active)onlineBroadcast();if(G.turn===(ONLINE.active?ONLINE.mySeat:0))return;if(ONLINE.active&&ONLINE.isHost){hostLoop();return}await loop();return}
  G.turn=(G.turn+1)%4;let s=0;while(G.dn[G.turn]&&s<4){G.turn=(G.turn+1)%4;s++}
  if(s>=4){await endRound();if(ONLINE.active)onlineBroadcast();return}
  if(ONLINE.active&&ONLINE.isHost){G.busy=false;render();onlineBroadcast();hostLoop();return}
  await loop();
}

function actPlay(){
  if(G.ph!=='play'||G.turn!==(ONLINE.active?ONLINE.mySeat:0)||G.busy)return;
  let sc=G.sel.map(id=>G.hd[ONLINE.active?ONLINE.mySeat:0].find(c=>c.id===id)).filter(Boolean);
  if(!sc.length){toast('请选择牌');return}
  let play=detect(sc,G.hui);if(!play){toast('无效牌型');return}
  let mySeat=ONLINE.active?ONLINE.mySeat:0;
  let free=!G.lp||G.lpp===mySeat;if(!free&&!beats(play,G.lp)){toast('打不过');return}
  G.sel=[];
  if(ONLINE.active&&!ONLINE.isHost){
    // 非主机: 发送操作给主机
    sendOnlineAction({type:'play',cards:play.cards});
    G.busy=true;render();
    return;
  }
  G.busy=true;
  execPlay(mySeat,play);showAP(mySeat,play.cards,false);render();
  if(ONLINE.active&&ONLINE.isHost)onlineBroadcast();
  afterPlayerPlay();
}
function actPass(){
  if(G.ph!=='play'||G.turn!==(ONLINE.active?ONLINE.mySeat:0)||G.busy)return;
  let mySeat=ONLINE.active?ONLINE.mySeat:0;
  if(!G.lp||G.lpp===mySeat){toast('必须出牌');return}
  G.sel=[];
  if(ONLINE.active&&!ONLINE.isHost){
    sendOnlineAction({type:'pass'});
    G.busy=true;render();
    return;
  }
  G.busy=true;execPass(mySeat);showAP(mySeat,null,true);render();
  if(ONLINE.active&&ONLINE.isHost)onlineBroadcast();
  if(!G.lp){G.turn=G.lpp;G.busy=false;render();if(ONLINE.active&&ONLINE.isHost){onlineBroadcast();hostLoop();return}if(G.turn===0)return;loop();return}
  G.turn=(G.turn+1)%4;let s=0;while(G.dn[G.turn]&&s<4){G.turn=(G.turn+1)%4;s++}
  if(s>=4){endRound();return}
  if(ONLINE.active&&ONLINE.isHost){G.busy=false;render();onlineBroadcast();hostLoop();return}
  loop();
}
function actHint(){
  if(G.ph!=='play'||G.turn!==0||G.busy)return;
  let free=!G.lp||G.lpp===0,plays=allPlays(G.hd[0],free?null:G.lp,G.hui);
  if(!plays.length){toast('没有能出的牌');return}
  G.hnt=(G.hnt+1)%(plays.length+1);
  if(G.hnt>=plays.length){G.sel=[];G.hnt=0}else G.sel=plays[G.hnt].cards.map(c=>c.id);
  render();
}

async function newGame(){ONLINE.active=false;ONLINE.isHost=false;ONLINE.mySeat=-1;ONLINE.nickNames=null;$('connStatus').className='offline';$('connStatus').textContent='单机模式';G.lv=[3,3,3,3];G.stg=[true,false,true,false];G.rnd=0;G.noTr=false;G.win=-1;await newRound()}
async function newRound(){
  G.rnd++;G.ph='deal';G.busy=true;G.lp=null;G.lpp=-1;G.ps=0;G.sel=[];G.played=[[],[],[],[]];
  showOv(`<div class="m"><h2>第${G.rnd}局</h2><p>发牌中...</p></div>`);await sl(500);
  let h3=deal();if(G.rnd===1){let t=h3%2;G.stg=[t===0,t===1,t===0,t===1]}
  G.hui=G.lv[G.stg.indexOf(true)];hideOv();render();
  if(G.rnd>1&&!G.noTr)await tributePhase();
  G.noTr=false;G.ph='play';G.turn=G.rnd===1?h3:(G.win>=0?G.win:0);G.busy=false;render();await loop();
}

// ====== 回合结束 ======
async function endRound(){
  G.ph='end';G.busy=true;
  for(let p=0;p<4;p++)if(G.hd[p].length===0&&!G.ord.includes(p)){G.ord.push(p);G.dn[p]=true}
  if(G.ord.length<2){let rem=[0,1,2,3].filter(p=>!G.ord.includes(p));rem.sort((a,b)=>G.hd[a].length-G.hd[b].length);G.ord.push(...rem)}
  G.win=G.ord[0];let ft=G.ord[0]%2,st=G.ord[1]%2,oldS=[...G.stg];
  let res=ft===st?doDbl(ft,oldS):doSgl(ft,oldS);
  await sl(300);showRes(res);G.busy=false;
}
function doDbl(wt,os){
  let lt=1-wt,was=os[wt],dem=false;
  if(os[lt]){for(let p=0;p<4;p++)if(p%2===lt){if(G.lv[p]===11){G.lv[p]=3;dem=true}else if(G.lv[p]===14){G.lv[p]=11;dem=true}}if(dem)G.noTr=true}
  if(was)for(let p=0;p<4;p++)if(p%2===wt){let v=G.lv[p];if(v===10)v=11;else if(v===13)v=14;else v+=2;if(v>14)v=15;G.lv[p]=v}
  for(let p=0;p<4;p++)G.stg[p]=p%2===wt;
  return{wt,dbl:true,go:G.lv.some(l=>l>=15),dem,up:was,upgraded:was,msg:`${['我方','对方'][wt]}双抓!`};
}
function doSgl(wt,os){
  let was=os[wt];let upgraded=false;
  if(was){
    let curLv=G.lv.find((l,i)=>i%2===wt)||3;
    // 从3开始: 单抓不升级,只能双抓升5
    if(curLv!==3){
      for(let p=0;p<4;p++)if(p%2===wt){let v=G.lv[p];if(v===10)v=11;else if(v===13)v=14;else v+=1;if(v>14)v=15;G.lv[p]=v}
      upgraded=true;
    }
  }
  for(let p=0;p<4;p++)G.stg[p]=p%2===wt;
  return{wt,dbl:false,go:G.lv.some(l=>l>=15),dem:false,up:was,upgraded,msg:`${['我方','对方'][wt]}获胜!`};
}
function showRes(r){
  let ls=`我方:${LN[G.lv[0]]||'过关'} | 对方:${LN[G.lv[1]]||'过关'}`;
  if(r.go){let w=G.lv[0]>=15?'我方':'对方';showOv(`<div class="m"><div class="big">🎉</div><h2>${w}最终胜利!</h2><p class="det">${ls}</p><p class="det">${r.msg}</p><button onclick="hideOv();newGame()">再来一局</button></div>`)}
  else{let d=r.dem?'<p style="color:#ff5722;font-weight:700">降级! 本局免上供</p>':'',u=r.upgraded?(r.dbl?'升2级':'升1级'):'上台(未升级)';showOv(`<div class="m"><h2>本局结束</h2><p>${r.msg}</p><p class="det">${u}</p><p class="det">${ls}</p>${d}<button onclick="hideOv();newRound()">下一局</button></div>`)}
}

async function joinRoom(id,nick){

    let seat=-1;for(let i=1;i<4;i++)if(!seats[i]){seat=i;break}

function subscribeRoom(){
  ONLINE.channel=ONLINE.sb.channel('room_'+ONLINE.roomId);

  ONLINE.channel.on('broadcast',{event:'interrupt_resp'},({payload})=>{if(ONLINE.isHost&&window._intrCb)window._intrCb(payload)});
  ONLINE.channel.on('broadcast',{event:'interrupt_req'},({payload})=>{if(!ONLINE.isHost&&payload.target===ONLINE.mySeat)handleInterruptReq(payload)});
  ONLINE.channel.on('broadcast',{event:'room_update'},({payload})=>{if(payload.seats)showWaitingRoom(ONLINE.roomId,payload.seats)});
  ONLINE.channel.on('broadcast',{event:'seat_remap'},({payload})=>{
    if(!ONLINE.isHost&&payload.newSeats){
      let newSeats=payload.newSeats;

}

async function selectTeammate(teammateSeat){
  // 重排座位: host=0, teammate=2, others=1,3
  let{data}=await ONLINE.sb.from('rooms').select('seats').eq('id',ONLINE.roomId).single();
  let oldSeats=data.seats;
  let newSeats=[null,null,null,null];
  newSeats[0]=oldSeats[0]; // host
  newSeats[2]=oldSeats[teammateSeat]; // teammate across
  let remaining=oldSeats.map((s,i)=>({s,i})).filter(x=>x.i!==0&&x.i!==teammateSeat);
  newSeats[1]=remaining[0].s;
  newSeats[3]=remaining[1].s;
  // 更新ONLINE状态
  ONLINE.seats=newSeats;
  ONLINE.nickNames=[...newSeats];
  // 根据新座位更新mySeat
  let myOldSeat=ONLINE.mySeat;
  if(myOldSeat===0) ONLINE.mySeat=0;
  else if(myOldSeat===teammateSeat) ONLINE.mySeat=2;
  else{
    let rem=oldSeats.map((s,i)=>i).filter(i=>i!==0&&i!==teammateSeat);
    ONLINE.mySeat=rem.indexOf(myOldSeat)===0?1:3;
  }
  await ONLINE.sb.from('rooms').update({seats:newSeats,status:'playing'}).eq('id',ONLINE.roomId);
  // 通知所有非主机玩家新的座位安排
  ONLINE.channel.send({type:'broadcast',event:'seat_remap',payload:{newSeats}});
  hideOv();
  G.lv=[3,3,3,3];G.stg=[true,false,true,false];G.rnd=0;G.noTr=false;G.win=-1;
  await hostNewRound();
}

async function leaveRoom(){
  clearInterval(window._pollTimer);
  if(ONLINE.channel){ONLINE.sb.removeChannel(ONLINE.channel);ONLINE.channel=null}
  if(ONLINE.roomId&&ONLINE.sb){
    try{await ONLINE.sb.from('rooms').delete().eq('id',ONLINE.roomId)}catch(e){}
  }
  ONLINE.roomId=null;ONLINE.isHost=false;ONLINE.mySeat=-1;
  showLobby();
}

// hostStartGame已移到selectTeammate

// ====== 主机游戏循环 ======
async function hostNewRound(){
  G.rnd++;G.ph='deal';G.busy=true;G.lp=null;G.lpp=-1;G.ps=0;G.sel=[];G.played=[[],[],[],[]];
  showOv(`<div class="m"><h2>第${G.rnd}局</h2><p>发牌中...</p></div>`);await sl(500);
  let h3=deal();if(G.rnd===1){let t=h3%2;G.stg=[t===0,t===1,t===0,t===1]}
  G.hui=G.lv[G.stg.indexOf(true)];hideOv();render();onlineBroadcast();
  if(G.rnd>1&&!G.noTr)await tributePhase();
  G.noTr=false;G.ph='play';G.turn=G.rnd===1?h3:(G.win>=0?G.win:0);G.busy=false;render();onlineBroadcast();
  await hostLoop();
}

async function hostLoop(){
  while(G.ph==='play'){
    render();onlineBroadcast();
    if(G.dn[G.turn]){G.turn=(G.turn+1)%4;continue}
    if(G.turn===ONLINE.mySeat){
      // 主机玩家的回合 - 等待操作
      return;
    }
    // 其他人类玩家 - 等待他们的操作(通过handleOnlineAction处理)
    return;
  }
}

function handleOnlineAction(action){
  if(action.type==='play'){
    let sc=action.cards.map(c=>G.hd[action.seat].find(hc=>hc.id===c.id)).filter(Boolean);
    if(!sc.length)return;
    let play=detect(sc,G.hui);if(!play)return;
    let free=!G.lp||G.lpp===action.seat;
    if(!free&&!beats(play,G.lp))return;
    G.busy=true;
    execPlay(action.seat,play);showAP(action.seat,play.cards,false);playFX(play.type);
    render();onlineBroadcast();
    (async()=>{
      if(G.hd[action.seat].length===0&&!G.dn[action.seat]){G.dn[action.seat]=true;G.ord.push(action.seat);toast(`${PN[action.seat]}出完了!`);await sl(300);onlineBroadcast();if(shouldEndRound()){await endRound();onlineBroadcast();return}}
      if(!G.lp){G.turn=G.lpp;G.busy=false;render();onlineBroadcast();hostLoop();return}
      G.turn=(G.turn+1)%4;let s=0;while(G.dn[G.turn]&&s<4){G.turn=(G.turn+1)%4;s++}
      if(s>=4){await endRound();onlineBroadcast();return}
      G.busy=false;render();onlineBroadcast();hostLoop();
    })();
  } else if(action.type==='pass'){
    G.busy=true;execPass(action.seat);showAP(action.seat,null,true);render();onlineBroadcast();
    (async()=>{
      if(!G.lp){G.turn=G.lpp;G.busy=false;render();onlineBroadcast();hostLoop();return}
      G.turn=(G.turn+1)%4;let s=0;while(G.dn[G.turn]&&s<4){G.turn=(G.turn+1)%4;s++}
      if(s>=4){await endRound();onlineBroadcast();return}
      G.busy=false;render();onlineBroadcast();hostLoop();
    })();
  }
}

// ====== 非主机接收 ======
function remapState(state){
  let me=ONLINE.mySeat;
  if(me===0)return state;
  let hd=[null,null,null,null];
  let played=[null,null,null,null];
  let dn=[null,null,null,null];
  let ord=state.ord.map(p=>(p-me+4)%4);
  for(let i=0;i<4;i++){
    let gs=(me+i)%4;
    hd[i]=state.hd[gs];
    played[i]=state.played[gs];
    dn[i]=state.dn[gs];
  }
  return{hd,lv:state.lv,stg:state.stg,hui:state.hui,
    turn:(state.turn-me+4)%4,ph:state.ph,
    lp:state.lp,lpp:state.lpp!==null?(state.lpp-me+4)%4:-1,
    ps:state.ps,dn,ord,played,rnd:state.rnd,noTr:state.noTr,
    win:state.win>=0?(state.win-me+4)%4:-1,sel:[]};
}
function applyRemoteState(state){
  let s=remapState(state);
  G.hd=s.hd;G.lv=s.lv;G.stg=s.stg;G.hui=s.hui;G.turn=s.turn;G.ph=s.ph;
  G.lp=s.lp;G.lpp=s.lpp;G.ps=s.ps;G.dn=s.dn;G.ord=s.ord;G.played=s.played;
  G.rnd=s.rnd;G.noTr=s.noTr;G.win=s.win;G.sel=[];G.busy=false;
  render();
}

function sendOnlineAction(action){
  if(!ONLINE.channel)return;
  ONLINE.channel.send({type:'action',payload:{...action,seat:ONLINE.mySeat}});
}

function handleInterruptReq(req){
  // 非主机收到岔/点请求
  if(req.kind==='cha'){
    askHumanCha(req.srcPlayer,req.srcCard,req.fours).then(didCha=>{
      ONLINE.channel.send({type:'interrupt_resp',payload:{kind:'cha',didCha,seat:ONLINE.mySeat}});
    });
  } else if(req.kind==='dian'){
    askHumanDian().then(didDian=>{
      ONLINE.channel.send({type:'interrupt_resp',payload:{kind:'dian',didDian,seat:ONLINE.mySeat}});
    });
  }
}

// ====== 初始化 ======
function showLobby(){
  showOv(`<div class="m"><h2>144</h2><p>四人两两队 · 从3打到A</p>
<p style="font-size:10px;color:rgba(255,255,255,.45);text-align:left;line-height:1.9">
· 对家同组, 在台上赢了才能升级<br>
· <b style="color:#ffa726">三条=炸弹, 四条=更大炸弹</b><br>
· 双王 > 四条, A44 > 一切<br>
· <b style="color:#81c784">单龙: 3+张连续,不能含会儿</b><br>
· 会儿牌比2大比王小<br>
· 出单4 → 任何人可用对4「岔」<br>
· 岔后 → 任何人可用单4「点」反抢<br>
· 一人出完继续打,抓对方两人或一人<br>
· <b style="color:#ffa726">从3必须双抓才能升5</b><br>
· 10和K只能升一级<br>
· 台上J被双抓→降到3, A→J</p>
<button class="lobby-btn primary" onclick="hideOv();newGame()">单机模式(AI)</button>
<button class="lobby-btn online" onclick="showOnlineSetup()">联机模式</button>
</div>`);
}

function showOnlineSetup(){
  let savedUrl=localStorage.getItem('supa_url')||SUPA_CFG.url||'';
  let savedKey=localStorage.getItem('supa_key')||SUPA_CFG.key||'';
  let savedNick=localStorage.getItem('supa_nick')||'';
  let connected=ONLINE.active?'<span style="color:#81c784">✓ 已连接</span>':'';
  showOv(`<div class="m"><h2>联机模式</h2>
<p class="det">需要Supabase云服务(免费)</p>
<div style="margin:10px 0">
<input class="lobby-input" id="cfgUrl" placeholder="Supabase URL (https://xxx.supabase.co)" value="${savedUrl}">
<input class="lobby-input" id="cfgKey" placeholder="Anon Key (eyJ...)" value="${savedKey}">
<input class="lobby-input" id="cfgNick" placeholder="你的昵称" value="${savedNick}">
</div>
<p style="font-size:9px;color:rgba(255,255,255,.3)">在 supabase.com 创建免费项目,从 Settings→API 获取URL和Key</p>
${connected}
<button class="lobby-btn online" onclick="connectAndLobby()">连接并进入大厅</button>
<button class="lobby-btn secondary" onclick="showLobby()">返回</button>
</div>`);
}

function connectAndLobby(){
  let url=$('cfgUrl').value.trim();
  let key=$('cfgKey').value.trim();
  let nick=$('cfgNick').value.trim()||'玩家';
  if(!url||!key){toast('请填写Supabase URL和Key');return}
  localStorage.setItem('supa_url',url);
  localStorage.setItem('supa_key',key);
  localStorage.setItem('supa_nick',nick);
  ONLINE.nick=nick;
  try{
    initSupabase(url,key);
    // 检查URL是否有room参数
    let params=new URLSearchParams(window.location.search);
    let room=params.get('room');
    if(room){joinRoom(room,nick)}
    else{showMainLobby()}
  }catch(e){
    showOv(`<div class="m"><h2>连接失败</h2><p style="color:#ef9a9a">${e.message}</p><p class="det">请确认:<br>1. 网络可以访问 cdn.jsdelivr.net<br>2. Supabase URL和Key填写正确<br>3. 刷新页面后重试</p><button class="lobby-btn secondary" onclick="showOnlineSetup()">返回</button></div>`);
  }
}

function showMainLobby(){
  showOv(`<div class="m"><h2>联机大厅</h2><p>昵称: <b>${ONLINE.nick}</b></p>
<button class="lobby-btn primary" onclick="hideOv();createRoom('${ONLINE.nick}')">创建房间</button>
<div style="margin:8px 0"><input class="lobby-input" id="joinId" placeholder="输入房间号加入"></div>
<button class="lobby-btn online" onclick="hideOv();joinRoom(document.getElementById('joinId').value,'${ONLINE.nick}')">加入房间</button>
<button class="lobby-btn secondary" onclick="showLobby()">返回</button>
</div>`);
}

// 启动 - 支持URL参数 ?mode=online&room=XXXXX
(function(){
  let params=new URLSearchParams(window.location.search);
  if(params.get('mode')==='online'){
    // 自动进入联机模式
    let savedUrl=localStorage.getItem('supa_url')||SUPA_CFG.url;
    let savedKey=localStorage.getItem('supa_key')||SUPA_CFG.key;
    let savedNick=localStorage.getItem('supa_nick')||'';
    if(!savedNick){
      // 需要先输入昵称
      showOnlineSetup();
      return;
    }
    ONLINE.nick=savedNick;
    try{
      initSupabase(savedUrl,savedKey);
      let room=params.get('room');
      if(room){
        // 自动加入房间
        joinRoom(room,savedNick);
      } else {
        showMainLobby();
      }
    }catch(e){
      showOv(`<div class="m"><h2>连接失败</h2><p style="color:#ef9a9a">${e.message}</p><button class="lobby-btn secondary" onclick="showLobby()">返回大厅</button></div>`);
    }
  } else {
    showLobby();
  }
})();
</script>
