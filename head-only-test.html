<!DOCTYPE html><html><head>
<script>
(function(){
  function fl(){
    var vw=window.innerWidth,vh=window.innerHeight;
    var b=document.body;
    console.log('fl run vw='+vw+' vh='+vh+' b='+(b?'ok':'null'));
    if(vh>vw){
      var s=vh/vw;
      b.style.margin='0';b.style.padding='0';b.style.overflow='hidden';
      b.style.width=vh+'px';b.style.height=vw+'px';
      b.style.position='fixed';b.style.top='0';b.style.left='0';
      b.style.transformOrigin='0 0';b.style.webkitTransformOrigin='0 0';
      var m='matrix(0,'+(-s)+','+s+',0,0,'+vh+')';
      b.style.transform=m;b.style.webkitTransform=m;b.style.msTransform=m;
      b.style.zIndex='1';
    }
  }
  fl();
  if(document.addEventListener)document.addEventListener('DOMContentLoaded',function(){fl();setTimeout(fl,50);setTimeout(fl,200)});
  window.addEventListener('load',function(){fl();setTimeout(fl,100);setTimeout(fl,500)});
  var iv=setInterval(fl,300);setTimeout(function(){clearInterval(iv)},5000);
})();
</script>
</head><body><div id="wrap">hello</div></body></html>
